name: mitre-attack-enterprise-demo
description: >
  Demo subset of the MITRE ATT&CK Enterprise knowledge graph.
  Contains 4 well-known threat groups (APT28, Lazarus Group, Kimsuky, APT41)
  with all connected techniques, software, campaigns, mitigations, detection
  strategies, and tactics. Showcases the full graph capabilities.

entity_types:
  Technique:
    description: "ATT&CK technique or sub-technique describing an adversary behavior."
    properties:
      technique_id:
        type: string
        primary_key: true
        description: "ATT&CK ID (e.g. T1055, T1055.011)"
      name:
        type: string
        indexed: true
      platforms:
        type: string
        description: "Pipe-delimited list of platforms (e.g. Windows|Linux|macOS)"
        optional: true
      is_subtechnique:
        type: string
        description: "'true' if this is a sub-technique, 'false' otherwise"
      stix_id:
        type: string
        description: "Original STIX 2.1 object ID"

  Tactic:
    description: "ATT&CK tactic representing a phase of the adversary lifecycle."
    properties:
      tactic_id:
        type: string
        primary_key: true
        description: "ATT&CK tactic ID (e.g. TA0001)"
      name:
        type: string
        indexed: true
      shortname:
        type: string
        indexed: true
        description: "URL-friendly tactic name (e.g. initial-access)"
      stix_id:
        type: string

  Group:
    description: "Threat actor group or intrusion set tracked by ATT&CK."
    properties:
      group_id:
        type: string
        primary_key: true
        description: "ATT&CK group ID (e.g. G0119)"
      name:
        type: string
        indexed: true
      aliases:
        type: string
        description: "Pipe-delimited list of known aliases"
        optional: true
      stix_id:
        type: string

  Software:
    description: "Malware or legitimate tool used by adversaries, tracked by ATT&CK."
    properties:
      software_id:
        type: string
        primary_key: true
        description: "ATT&CK software ID (e.g. S0154)"
      name:
        type: string
        indexed: true
      software_type:
        type: string
        enum: [malware, tool]
        description: "Whether this is malware or a legitimate tool"
      platforms:
        type: string
        optional: true
        description: "Pipe-delimited list of platforms"
      stix_id:
        type: string

  Mitigation:
    description: "Defensive countermeasure that mitigates one or more techniques."
    properties:
      mitigation_id:
        type: string
        primary_key: true
        description: "ATT&CK mitigation ID (e.g. M1031)"
      name:
        type: string
        indexed: true
      stix_id:
        type: string

  Campaign:
    description: "Named threat campaign or operation attributed to a group."
    properties:
      campaign_id:
        type: string
        primary_key: true
        description: "ATT&CK campaign ID (e.g. C0027)"
      name:
        type: string
        indexed: true
      first_seen:
        type: string
        optional: true
      last_seen:
        type: string
        optional: true
      stix_id:
        type: string

  DataComponent:
    description: "A specific type of data that can be collected for detection."
    properties:
      component_id:
        type: string
        primary_key: true
        description: "ATT&CK data component ID (e.g. DC0084)"
      name:
        type: string
        indexed: true
      stix_id:
        type: string

  DetectionStrategy:
    description: "Detection guidance for a specific technique, describing how to detect adversary behavior."
    properties:
      detection_id:
        type: string
        primary_key: true
        description: "ATT&CK detection strategy ID (e.g. DET0237)"
      name:
        type: string
        indexed: true
      stix_id:
        type: string

relationships:
  - name: technique_in_tactic
    description: "A technique belongs to one or more tactical phases."
    from: Technique
    to: Tactic
    cardinality: many

  - name: subtechnique_of
    description: "A sub-technique is a more specific variant of a parent technique."
    from: Technique
    to: Technique
    cardinality: many

  - name: group_uses_technique
    description: "A threat group has been observed using a technique."
    from: Group
    to: Technique
    cardinality: many

  - name: group_uses_software
    description: "A threat group has been observed using specific software."
    from: Group
    to: Software
    cardinality: many

  - name: software_uses_technique
    description: "Software implements or enables a specific technique."
    from: Software
    to: Technique
    cardinality: many

  - name: campaign_uses_technique
    description: "A campaign employed a specific technique."
    from: Campaign
    to: Technique
    cardinality: many

  - name: campaign_uses_software
    description: "A campaign employed specific software."
    from: Campaign
    to: Software
    cardinality: many

  - name: campaign_attributed_to
    description: "A campaign is attributed to a specific threat group."
    from: Campaign
    to: Group
    cardinality: many
    inverse: campaigns

  - name: mitigates
    description: "A mitigation addresses or reduces the impact of a technique."
    from: Mitigation
    to: Technique
    cardinality: many

  - name: detects
    description: "A detection strategy can identify when a technique is being used."
    from: DetectionStrategy
    to: Technique
    cardinality: many

named_queries:
  group_techniques:
    description: >
      Given a threat group, return all techniques it uses.
      Answers: what TTPs does this group employ?
    entry_point: Group
    returns: Technique
    traversal:
      - relationship: group_uses_technique
        direction: outgoing

  group_software:
    description: >
      Given a threat group, return all software it uses.
      Answers: what malware and tools does this group use?
    entry_point: Group
    returns: Software
    traversal:
      - relationship: group_uses_software
        direction: outgoing

  group_campaigns:
    description: >
      Given a threat group, return campaigns attributed to it.
      Answers: what operations has this group conducted?
    entry_point: Group
    returns: Campaign
    traversal:
      - relationship: campaign_attributed_to
        direction: incoming

  technique_groups:
    description: >
      Given a technique, return which threat groups use it.
      Answers: who employs this technique?
    entry_point: Technique
    returns: Group
    traversal:
      - relationship: group_uses_technique
        direction: incoming

  technique_mitigations:
    description: >
      Given a technique, return mitigations that address it.
      Answers: how do we defend against this technique?
    entry_point: Technique
    returns: Mitigation
    traversal:
      - relationship: mitigates
        direction: incoming

  technique_detections:
    description: >
      Given a technique, return detection strategies that can identify it.
      Answers: how do we detect this technique?
    entry_point: Technique
    returns: DetectionStrategy
    traversal:
      - relationship: detects
        direction: incoming

  technique_software:
    description: >
      Given a technique, return software that implements it.
      Answers: what malware/tools use this technique?
    entry_point: Technique
    returns: Software
    traversal:
      - relationship: software_uses_technique
        direction: incoming

  technique_tactics:
    description: >
      Given a technique, return which tactics it belongs to.
      Answers: what attack phases does this technique support?
    entry_point: Technique
    returns: Tactic
    traversal:
      - relationship: technique_in_tactic
        direction: outgoing

  campaign_breakdown:
    description: >
      Given a campaign, return its attributed group.
      Answers: who is behind this campaign?
    entry_point: Campaign
    returns: Group
    traversal:
      - relationship: campaign_attributed_to
        direction: outgoing

  campaign_techniques:
    description: >
      Given a campaign, return techniques it employed.
      Answers: what TTPs were used in this campaign?
    entry_point: Campaign
    returns: Technique
    traversal:
      - relationship: campaign_uses_technique
        direction: outgoing

  software_techniques:
    description: >
      Given a piece of software, return techniques it implements.
      Answers: what capabilities does this malware/tool have?
    entry_point: Software
    returns: Technique
    traversal:
      - relationship: software_uses_technique
        direction: outgoing

  software_groups:
    description: >
      Given a piece of software, return groups that use it.
      Answers: who uses this malware/tool?
    entry_point: Software
    returns: Group
    traversal:
      - relationship: group_uses_software
        direction: incoming

  tactic_techniques:
    description: >
      Given a tactic, return all techniques that belong to it.
      Answers: what techniques fall under this attack phase?
    entry_point: Tactic
    returns: Technique
    traversal:
      - relationship: technique_in_tactic
        direction: incoming

  mitigation_coverage:
    description: >
      Given a mitigation, return all techniques it addresses.
      Answers: what attack techniques does this defensive measure cover?
    entry_point: Mitigation
    returns: Technique
    traversal:
      - relationship: mitigates
        direction: outgoing

constraints: []

ingestion:
  techniques:
    description: "Ingest ATT&CK techniques and sub-techniques from CSV."
    entity_type: Technique
    id_column: technique_id
    column_map:
      technique_id: technique_id
      name: name
      platforms: platforms
      is_subtechnique: is_subtechnique
      stix_id: stix_id

  tactics:
    description: "Ingest ATT&CK tactics from CSV."
    entity_type: Tactic
    id_column: tactic_id
    column_map:
      tactic_id: tactic_id
      name: name
      shortname: shortname
      stix_id: stix_id

  groups:
    description: "Ingest ATT&CK threat groups from CSV."
    entity_type: Group
    id_column: group_id
    column_map:
      group_id: group_id
      name: name
      aliases: aliases
      stix_id: stix_id

  software:
    description: "Ingest ATT&CK software (malware and tools) from CSV."
    entity_type: Software
    id_column: software_id
    column_map:
      software_id: software_id
      name: name
      software_type: software_type
      platforms: platforms
      stix_id: stix_id

  mitigations:
    description: "Ingest ATT&CK mitigations from CSV."
    entity_type: Mitigation
    id_column: mitigation_id
    column_map:
      mitigation_id: mitigation_id
      name: name
      stix_id: stix_id

  campaigns:
    description: "Ingest ATT&CK campaigns from CSV."
    entity_type: Campaign
    id_column: campaign_id
    column_map:
      campaign_id: campaign_id
      name: name
      first_seen: first_seen
      last_seen: last_seen
      stix_id: stix_id

  data_components:
    description: "Ingest ATT&CK data components from CSV."
    entity_type: DataComponent
    id_column: component_id
    column_map:
      component_id: component_id
      name: name
      stix_id: stix_id

  detection_strategies:
    description: "Ingest ATT&CK detection strategies from CSV."
    entity_type: DetectionStrategy
    id_column: detection_id
    column_map:
      detection_id: detection_id
      name: name
      stix_id: stix_id

  rel_technique_in_tactic:
    description: "Ingest technique-to-tactic mappings."
    relationship_type: technique_in_tactic
    from_column: technique_id
    to_column: tactic_id

  rel_subtechnique_of:
    description: "Ingest sub-technique parent relationships."
    relationship_type: subtechnique_of
    from_column: child_technique_id
    to_column: parent_technique_id

  rel_group_uses_technique:
    description: "Ingest group-uses-technique relationships."
    relationship_type: group_uses_technique
    from_column: group_id
    to_column: technique_id

  rel_group_uses_software:
    description: "Ingest group-uses-software relationships."
    relationship_type: group_uses_software
    from_column: group_id
    to_column: software_id

  rel_software_uses_technique:
    description: "Ingest software-uses-technique relationships."
    relationship_type: software_uses_technique
    from_column: software_id
    to_column: technique_id

  rel_campaign_uses_technique:
    description: "Ingest campaign-uses-technique relationships."
    relationship_type: campaign_uses_technique
    from_column: campaign_id
    to_column: technique_id

  rel_campaign_uses_software:
    description: "Ingest campaign-uses-software relationships."
    relationship_type: campaign_uses_software
    from_column: campaign_id
    to_column: software_id

  rel_campaign_attributed_to:
    description: "Ingest campaign-to-group attribution relationships."
    relationship_type: campaign_attributed_to
    from_column: campaign_id
    to_column: group_id

  rel_mitigates:
    description: "Ingest mitigation-to-technique relationships."
    relationship_type: mitigates
    from_column: mitigation_id
    to_column: technique_id

  rel_detects:
    description: "Ingest detection-strategy-to-technique relationships."
    relationship_type: detects
    from_column: detection_id
    to_column: technique_id
