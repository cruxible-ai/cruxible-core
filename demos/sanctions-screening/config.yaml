name: sanctions-screening
description: >
  Curated demo of OFAC sanctions screening. Traces ownership chains,
  directorships, and offshore structures to find hidden connections between
  counterparties and sanctioned entities.

entity_types:
  SanctionedEntity:
    description: Person or organization on the OFAC SDN list
    properties:
      entity_id: {type: string, primary_key: true}
      name: {type: string, indexed: true}
      entity_type: {type: string}
      country: {type: string, optional: true}
      programs: {type: string, optional: true}
      aliases: {type: string, optional: true}

  OffshoreCompany:
    description: Offshore company from ICIJ Offshore Leaks database
    properties:
      node_id: {type: string, primary_key: true}
      name: {type: string, indexed: true}
      jurisdiction: {type: string, optional: true}
      status: {type: string, optional: true}
      country: {type: string, optional: true}
      incorporation_date: {type: string, optional: true}
      source_id: {type: string, optional: true}

  Officer:
    description: Officer (person or company) from ICIJ Offshore Leaks database
    properties:
      node_id: {type: string, primary_key: true}
      name: {type: string, indexed: true}
      country: {type: string, optional: true}
      source_id: {type: string, optional: true}

relationships:
  - name: sdn_connection
    description: Ownership or directorship link between sanctioned entities
    from: SanctionedEntity
    to: SanctionedEntity
    properties:
      connection_type: {type: string}
      role: {type: string, optional: true}

  - name: officer_of
    description: Officer role at an offshore company (shareholder, director, beneficial owner, etc.)
    from: Officer
    to: OffshoreCompany
    properties:
      link_type: {type: string, optional: true}
      start_date: {type: string, optional: true}
      end_date: {type: string, optional: true}

  - name: xref_officer
    description: Cross-reference match between an ICIJ officer and a sanctioned entity
    from: Officer
    to: SanctionedEntity
    properties:
      source: {type: string, optional: true}
      confidence: {type: number, optional: true}
      evidence: {type: string, optional: true}
      match_type: {type: string, optional: true}

  - name: xref_company
    description: Cross-reference match between an offshore company and a sanctioned entity
    from: OffshoreCompany
    to: SanctionedEntity
    properties:
      source: {type: string, optional: true}
      confidence: {type: number, optional: true}
      evidence: {type: string, optional: true}
      match_type: {type: string, optional: true}

named_queries:
  screen_company:
    description: "Is this offshore company connected to any sanctioned entity?"
    entry_point: OffshoreCompany
    returns: SanctionedEntity
    traversal:
      - relationship: xref_company
        direction: outgoing

  find_offshore:
    description: "What shell companies is this sanctioned person hiding behind?"
    entry_point: SanctionedEntity
    returns: OffshoreCompany
    traversal:
      - relationship: xref_officer
        direction: incoming
      - relationship: officer_of
        direction: outgoing

  full_risk_profile:
    description: "Complete picture on a sanctioned entity — all ownership and directorship chains."
    entry_point: SanctionedEntity
    returns: SanctionedEntity
    traversal:
      - relationship: sdn_connection
        direction: both

constraints: []

ingestion:
  sanctioned_entities:
    description: OFAC SDN sanctioned persons and organizations
    entity_type: SanctionedEntity
    id_column: entity_id
    column_map:
      entity_id: entity_id
      name: name
      entity_type: entity_type
      country: country
      programs: programs
      aliases: aliases

  offshore_companies:
    description: Offshore companies from ICIJ Offshore Leaks
    entity_type: OffshoreCompany
    id_column: node_id
    column_map:
      node_id: node_id
      name: name
      jurisdiction: jurisdiction
      status: status
      country: country
      incorporation_date: incorporation_date
      source_id: source_id

  officers:
    description: Officers from ICIJ Offshore Leaks
    entity_type: Officer
    id_column: node_id
    column_map:
      node_id: node_id
      name: name
      country: country
      source_id: source_id

  sdn_connections:
    description: Ownership and directorship links between sanctioned entities
    relationship_type: sdn_connection
    from_column: from_id
    to_column: to_id
    column_map:
      connection_type: connection_type
      role: role

  officer_of_rels:
    description: Officer-to-company relationships from ICIJ
    relationship_type: officer_of
    from_column: from_id
    to_column: to_id
    column_map:
      link_type: link_type
      start_date: start_date
      end_date: end_date

  xref_officer_edges:
    description: Pre-computed cross-references between officers and sanctioned entities
    relationship_type: xref_officer
    from_column: from_id
    to_column: to_id
    column_map:
      source: source
      confidence: confidence
      evidence: evidence
      match_type: match_type

  xref_company_edges:
    description: Pre-computed cross-references between offshore companies and sanctioned entities
    relationship_type: xref_company
    from_column: from_id
    to_column: to_id
    column_map:
      source: source
      confidence: confidence
      evidence: evidence
      match_type: match_type
