version: "1.0"
name: manufacturing_judgment_memory
kind: world_model
description: >
  Recipe-first internal manufacturing world model focused on turning
  spreadsheet logic and one-off operational decisions into governed,
  reusable company memory. The deterministic backbone comes from ERP, PLM,
  MES, and QMS exports. The compounding asset lives in accepted judgment
  relationships such as substitutes, plant qualifications, waivers, and
  defect impact decisions.

entity_types:
  Part:
    description: Canonical part or component family.
    properties:
      part_id: {type: string, primary_key: true}
      name: {type: string, indexed: true}
      family: {type: string, optional: true}
      lifecycle_state: {type: string, optional: true}

  Revision:
    description: A specific released or in-flight revision of a part.
    properties:
      revision_id: {type: string, primary_key: true}
      rev_code: {type: string}
      description: {type: string, optional: true}
      status: {type: string, optional: true}

  Assembly:
    description: Product or assembly that contains one or more revisions.
    properties:
      assembly_id: {type: string, primary_key: true}
      name: {type: string, indexed: true}
      program: {type: string, optional: true}

  Plant:
    description: Manufacturing site or plant.
    properties:
      plant_id: {type: string, primary_key: true}
      name: {type: string, indexed: true}
      region: {type: string, optional: true}

  Line:
    description: Production line inside a plant.
    properties:
      line_id: {type: string, primary_key: true}
      name: {type: string}
      line_type: {type: string, optional: true}

  Tool:
    description: Tooling, fixture, mold, or machine dependency.
    properties:
      tool_id: {type: string, primary_key: true}
      name: {type: string}
      tool_type: {type: string, optional: true}

  Spec:
    description: Requirement or specification that can constrain production.
    properties:
      spec_id: {type: string, primary_key: true}
      name: {type: string}
      version: {type: string, optional: true}

  Supplier:
    description: Approved or candidate supplier.
    properties:
      supplier_id: {type: string, primary_key: true}
      name: {type: string, indexed: true}
      country: {type: string, optional: true}

  Material:
    description: Material family or stock used by a revision or process.
    properties:
      material_id: {type: string, primary_key: true}
      name: {type: string}
      material_class: {type: string, optional: true}

  Process:
    description: Manufacturing process step or capability.
    properties:
      process_id: {type: string, primary_key: true}
      name: {type: string}
      process_family: {type: string, optional: true}

  Customer:
    description: Customer, account, or program owner with approval scope.
    properties:
      customer_id: {type: string, primary_key: true}
      name: {type: string, indexed: true}
      segment: {type: string, optional: true}

  Lot:
    description: Manufactured lot or batch of a revision.
    properties:
      lot_id: {type: string, primary_key: true}
      manufactured_at: {type: string, optional: true}
      quantity: {type: int, optional: true}

  Shipment:
    description: Shipment or fulfillment unit sent to a customer.
    properties:
      shipment_id: {type: string, primary_key: true}
      shipped_at: {type: string, optional: true}
      destination: {type: string, optional: true}

  ChangeOrder:
    description: Engineering or quality change that may force rework or review.
    properties:
      change_order_id: {type: string, primary_key: true}
      status: {type: string, optional: true}
      effective_date: {type: string, optional: true}

  Deviation:
    description: Temporary waiver, deviation, or concession.
    properties:
      deviation_id: {type: string, primary_key: true}
      status: {type: string, optional: true}
      expires_at: {type: string, optional: true}

  Defect:
    description: Defect cluster, issue class, or nonconformance.
    properties:
      defect_id: {type: string, primary_key: true}
      category: {type: string, optional: true}
      severity: {type: string, optional: true}

relationships:
  - name: revision_of
    description: Deterministic link from a revision to its parent part.
    from: Revision
    to: Part
    is_hierarchy: true

  - name: assembly_contains_revision
    description: Assembly contains a specific revision.
    from: Assembly
    to: Revision
    properties:
      quantity: {type: int, optional: true}

  - name: revision_supplied_by
    description: Revision is sourced from or approved through a supplier.
    from: Revision
    to: Supplier
    properties:
      source_role: {type: string, optional: true}

  - name: revision_requires_material
    description: Revision requires a material family.
    from: Revision
    to: Material

  - name: revision_requires_process
    description: Revision requires a manufacturing process capability.
    from: Revision
    to: Process

  - name: revision_requires_tool
    description: Revision requires specific tooling.
    from: Revision
    to: Tool

  - name: revision_constrained_by_spec
    description: Revision is constrained by a governing specification.
    from: Revision
    to: Spec

  - name: line_in_plant
    description: Line belongs to a plant.
    from: Line
    to: Plant

  - name: line_uses_tool
    description: Line is configured to use a tool or fixture.
    from: Line
    to: Tool

  - name: line_supports_process
    description: Line supports a process capability.
    from: Line
    to: Process

  - name: line_handles_material
    description: Line can handle a material class.
    from: Line
    to: Material

  - name: lot_of_revision
    description: Lot contains manufactured units of a revision.
    from: Lot
    to: Revision

  - name: lot_manufactured_on_line
    description: Lot was manufactured on a specific line.
    from: Lot
    to: Line

  - name: lot_shipped_in
    description: Lot contributes to a shipment.
    from: Lot
    to: Shipment

  - name: shipment_for_customer
    description: Shipment is destined for a customer.
    from: Shipment
    to: Customer

  - name: change_targets_revision
    description: Change order directly targets a revision.
    from: ChangeOrder
    to: Revision

  - name: defect_detected_on_lot
    description: Defect was first observed on a lot.
    from: Defect
    to: Lot

  - name: alternate_for
    description: Accepted substitute revision for a target revision.
    from: Revision
    to: Revision
    properties:
      scope_plant_id: {type: string, optional: true}
      scope_customer_id: {type: string, optional: true}
      effective_until: {type: string, optional: true}
      rationale: {type: string, optional: true}
    matching:
      integrations:
        compatibility_evidence:
          role: required
          always_review_on_unsure: true

  - name: qualified_at
    description: Accepted decision that a revision is qualified on a specific line.
    from: Revision
    to: Line
    properties:
      scope_customer_id: {type: string, optional: true}
      qualification_basis: {type: string, optional: true}
      effective_until: {type: string, optional: true}
    matching:
      integrations:
        qualification_evidence:
          role: required
          always_review_on_unsure: true

  - name: approved_for_customer
    description: Accepted customer-specific approval for a revision.
    from: Revision
    to: Customer
    properties:
      approval_basis: {type: string, optional: true}
      effective_until: {type: string, optional: true}
    matching:
      integrations:
        change_review:
          role: required

  - name: waived_by
    description: Accepted deviation or waiver applied to a revision.
    from: Revision
    to: Deviation
    properties:
      waived_requirement: {type: string, optional: true}
      effective_until: {type: string, optional: true}
    matching:
      integrations:
        change_review:
          role: required

  - name: blocked_by
    description: Accepted judgment that a spec currently blocks use of a revision.
    from: Revision
    to: Spec
    properties:
      blocking_reason: {type: string, optional: true}
      status: {type: string, optional: true}
    matching:
      integrations:
        change_review:
          role: required

  - name: suspected_cause_of
    description: Accepted judgment linking a revision to a defect cluster.
    from: Revision
    to: Defect
    properties:
      confidence: {type: number, optional: true}
      rationale: {type: string, optional: true}
    matching:
      integrations:
        quality_signal:
          role: required
          always_review_on_unsure: true

  - name: impacts
    description: Accepted judgment that a defect materially impacts a shipment.
    from: Defect
    to: Shipment
    properties:
      action: {type: string, optional: true}
      rationale: {type: string, optional: true}
    matching:
      integrations:
        quality_signal:
          role: required

  - name: requires_reinspection
    description: Accepted judgment that a change order forces lot reinspection.
    from: ChangeOrder
    to: Lot
    properties:
      reason: {type: string, optional: true}
      priority: {type: string, optional: true}
    matching:
      integrations:
        change_review:
          role: required

  - name: safe_to_substitute
    description: Accepted judgment that one revision is safe to substitute for another.
    from: Revision
    to: Revision
    properties:
      scope_plant_id: {type: string, optional: true}
      scope_customer_id: {type: string, optional: true}
      rationale: {type: string, optional: true}
    matching:
      integrations:
        compatibility_evidence:
          role: required
          always_review_on_unsure: true

  - name: not_interchangeable_with
    description: Accepted judgment that two revisions must not be interchanged.
    from: Revision
    to: Revision
    properties:
      rationale: {type: string, optional: true}
      risk_class: {type: string, optional: true}
    matching:
      integrations:
        compatibility_evidence:
          role: required
          always_review_on_unsure: true

named_queries:
  where_can_revision_run:
    description: >
      Starting from a revision, find all plants where it is currently qualified
      to run based on accepted qualification state.
    entry_point: Revision
    returns: Plant
    traversal:
      - relationship: qualified_at
        direction: outgoing
      - relationship: line_in_plant
        direction: outgoing

  approved_alternates_for_revision:
    description: >
      Starting from a revision, find accepted alternates and safe substitutes.
    entry_point: Revision
    returns: Revision
    traversal:
      - relationship: [alternate_for, safe_to_substitute]
        direction: both

  change_blast_radius:
    description: >
      Starting from a change order, trace to targeted revisions, affected lots,
      and impacted shipments to estimate downstream operational scope.
    entry_point: ChangeOrder
    returns: Shipment
    traversal:
      - relationship: change_targets_revision
        direction: outgoing
      - relationship: lot_of_revision
        direction: incoming
      - relationship: lot_shipped_in
        direction: outgoing

  defect_traceback:
    description: >
      Starting from a defect, find observed lots and trace back to the
      implicated revisions and parent parts.
    entry_point: Defect
    returns: Part
    traversal:
      - relationship: defect_detected_on_lot
        direction: outgoing
      - relationship: lot_of_revision
        direction: outgoing
      - relationship: revision_of
        direction: outgoing

  reinspection_queue:
    description: >
      Starting from a change order, find shipments touched by lots that require
      reinspection because of the change.
    entry_point: ChangeOrder
    returns: Shipment
    traversal:
      - relationship: requires_reinspection
        direction: outgoing
      - relationship: lot_shipped_in
        direction: outgoing

  blocked_revisions_for_spec:
    description: >
      Starting from a spec, find revisions currently blocked by unresolved
      approval or compliance issues.
    entry_point: Spec
    returns: Revision
    traversal:
      - relationship: blocked_by
        direction: incoming

constraints:
  - name: no_self_alternate
    description: A revision cannot be an alternate for itself.
    rule: "alternate_for.FROM.revision_id != alternate_for.TO.revision_id"
    severity: error

  - name: no_self_safe_substitute
    description: A revision cannot be marked safe to substitute for itself.
    rule: "safe_to_substitute.FROM.revision_id != safe_to_substitute.TO.revision_id"
    severity: error

  - name: no_self_non_interchangeable
    description: A revision cannot be marked non-interchangeable with itself.
    rule: "not_interchangeable_with.FROM.revision_id != not_interchangeable_with.TO.revision_id"
    severity: error

ingestion:
  parts:
    description: Part master export from ERP or PLM.
    entity_type: Part
    id_column: part_id
    column_map:
      part_id: part_id
      name: name
      family: family
      lifecycle_state: lifecycle_state

  revisions:
    description: Revision master export from PLM.
    entity_type: Revision
    id_column: revision_id
    column_map:
      revision_id: revision_id
      rev_code: rev_code
      description: description
      status: status

  assemblies:
    description: Product and assembly master export.
    entity_type: Assembly
    id_column: assembly_id
    column_map:
      assembly_id: assembly_id
      name: name
      program: program

  plants:
    description: Plant master export.
    entity_type: Plant
    id_column: plant_id
    column_map:
      plant_id: plant_id
      name: name
      region: region

  lines:
    description: Line and workcenter export from MES or ERP.
    entity_type: Line
    id_column: line_id
    column_map:
      line_id: line_id
      name: name
      line_type: line_type

  tools:
    description: Tooling and fixture master export.
    entity_type: Tool
    id_column: tool_id
    column_map:
      tool_id: tool_id
      name: name
      tool_type: tool_type

  specs:
    description: Specification register export.
    entity_type: Spec
    id_column: spec_id
    column_map:
      spec_id: spec_id
      name: name
      version: version

  suppliers:
    description: Supplier master export.
    entity_type: Supplier
    id_column: supplier_id
    column_map:
      supplier_id: supplier_id
      name: name
      country: country

  materials:
    description: Material master export.
    entity_type: Material
    id_column: material_id
    column_map:
      material_id: material_id
      name: name
      material_class: material_class

  processes:
    description: Process capability export.
    entity_type: Process
    id_column: process_id
    column_map:
      process_id: process_id
      name: name
      process_family: process_family

  customers:
    description: Customer or program account export.
    entity_type: Customer
    id_column: customer_id
    column_map:
      customer_id: customer_id
      name: name
      segment: segment

  lots:
    description: Lot or batch history export.
    entity_type: Lot
    id_column: lot_id
    column_map:
      lot_id: lot_id
      manufactured_at: manufactured_at
      quantity: quantity

  shipments:
    description: Shipment history export.
    entity_type: Shipment
    id_column: shipment_id
    column_map:
      shipment_id: shipment_id
      shipped_at: shipped_at
      destination: destination

  change_orders:
    description: Engineering or quality change export.
    entity_type: ChangeOrder
    id_column: change_order_id
    column_map:
      change_order_id: change_order_id
      status: status
      effective_date: effective_date

  deviations:
    description: Deviation or waiver register export.
    entity_type: Deviation
    id_column: deviation_id
    column_map:
      deviation_id: deviation_id
      status: status
      expires_at: expires_at

  defects:
    description: Defect, NCR, or issue cluster export.
    entity_type: Defect
    id_column: defect_id
    column_map:
      defect_id: defect_id
      category: category
      severity: severity

  revision_of_edges:
    description: Deterministic part revision hierarchy export.
    relationship_type: revision_of
    from_column: revision_id
    to_column: part_id

  assembly_contains_revision_edges:
    description: Assembly-to-revision BOM export.
    relationship_type: assembly_contains_revision
    from_column: assembly_id
    to_column: revision_id
    column_map:
      quantity: quantity

  revision_supplied_by_edges:
    description: Supplier approval or sourcing export.
    relationship_type: revision_supplied_by
    from_column: revision_id
    to_column: supplier_id
    column_map:
      source_role: source_role

  revision_requires_material_edges:
    description: Revision-to-material requirements export.
    relationship_type: revision_requires_material
    from_column: revision_id
    to_column: material_id

  revision_requires_process_edges:
    description: Revision-to-process requirements export.
    relationship_type: revision_requires_process
    from_column: revision_id
    to_column: process_id

  revision_requires_tool_edges:
    description: Revision-to-tool requirements export.
    relationship_type: revision_requires_tool
    from_column: revision_id
    to_column: tool_id

  revision_constrained_by_spec_edges:
    description: Revision-to-spec constraint export.
    relationship_type: revision_constrained_by_spec
    from_column: revision_id
    to_column: spec_id

  line_in_plant_edges:
    description: Line-to-plant hierarchy export.
    relationship_type: line_in_plant
    from_column: line_id
    to_column: plant_id

  line_uses_tool_edges:
    description: Line tooling assignment export.
    relationship_type: line_uses_tool
    from_column: line_id
    to_column: tool_id

  line_supports_process_edges:
    description: Line process capability export.
    relationship_type: line_supports_process
    from_column: line_id
    to_column: process_id

  line_handles_material_edges:
    description: Line material capability export.
    relationship_type: line_handles_material
    from_column: line_id
    to_column: material_id

  lot_of_revision_edges:
    description: Lot genealogy export linking lots to revisions.
    relationship_type: lot_of_revision
    from_column: lot_id
    to_column: revision_id

  lot_manufactured_on_line_edges:
    description: Lot-to-line production history export.
    relationship_type: lot_manufactured_on_line
    from_column: lot_id
    to_column: line_id

  lot_shipped_in_edges:
    description: Lot-to-shipment traceability export.
    relationship_type: lot_shipped_in
    from_column: lot_id
    to_column: shipment_id

  shipment_for_customer_edges:
    description: Shipment destination export.
    relationship_type: shipment_for_customer
    from_column: shipment_id
    to_column: customer_id

  change_targets_revision_edges:
    description: Change order target revisions export.
    relationship_type: change_targets_revision
    from_column: change_order_id
    to_column: revision_id

  defect_detected_on_lot_edges:
    description: Defect-to-lot observation export.
    relationship_type: defect_detected_on_lot
    from_column: defect_id
    to_column: lot_id

integrations:
  compatibility_evidence:
    kind: engineering_review
    contract:
      output: support|unsure|contradict

  qualification_evidence:
    kind: manufacturing_validation
    contract:
      output: support|unsure|contradict

  change_review:
    kind: controlled_change_review
    contract:
      output: support|unsure|contradict

  quality_signal:
    kind: quality_signal
    contract:
      output: support|unsure|contradict
