name: drug_interactions_demo
description: >
  Demo subset of the clinical drug interaction graph. 47 curated drugs
  across 6 therapeutic classes plus 6 CYP450 enzymes. Pre-built graph —
  load with cruxible_init(root_dir="example/").

entity_types:
  Drug:
    description: A pharmaceutical drug from DDinter and/or CYP450 datasets.
    properties:
      drug_id:
        type: string
        primary_key: true
        description: Lowercase normalized drug name
      name:
        type: string
        description: Display name of the drug
      atc_code:
        type: string
        optional: true
        description: ATC level-1 code(s) from DDinter file grouping
      ddinter_id:
        type: string
        optional: true
        description: DDinter database identifier
      in_ddinter:
        type: string
        optional: true
        description: Whether drug appears in DDinter dataset
      in_cyp450:
        type: string
        optional: true
        description: Whether drug appears in CYP450 substrate dataset

  Enzyme:
    description: A CYP450 metabolic enzyme that processes drugs.
    properties:
      enzyme_id:
        type: string
        primary_key: true
        description: Enzyme identifier (e.g. cyp3a4)
      name:
        type: string
        description: Standard enzyme name (e.g. CYP3A4)
      family:
        type: string
        description: Enzyme family (CYP450)

relationships:
  - name: interacts_with
    description: >
      Known drug-drug interaction from DDinter database.
      Severity levels: Major, Moderate, Minor, Unknown.
    from: Drug
    to: Drug
    cardinality: many
    properties:
      severity:
        type: string
        description: Interaction severity (Major/Moderate/Minor/Unknown)

  - name: metabolized_by
    description: >
      Drug is a substrate of this CYP450 enzyme (deterministic from dataset).
      Label=1 substrates from combined training+testing sets.
    from: Drug
    to: Enzyme
    cardinality: many
    properties:
      source:
        type: string
        description: Data source for this relationship

  - name: inhibits
    description: >
      Drug inhibits this CYP450 enzyme (AI-inferred from clinical literature).
      Sparse initially, improves through feedback loop.
    from: Drug
    to: Enzyme
    cardinality: many
    properties:
      confidence:
        type: float
        description: Confidence score 0.0-1.0 (0.3=low, 0.5=medium, 0.7=high, 0.9=very_high)
      evidence:
        type: string
        description: Source or citation for this assertion
      source:
        type: string
        description: How this relationship was determined

  - name: induces
    description: >
      Drug induces this CYP450 enzyme (AI-inferred from clinical literature).
      Sparse initially, improves through feedback loop.
    from: Drug
    to: Enzyme
    cardinality: many
    properties:
      confidence:
        type: float
        description: Confidence score 0.0-1.0 (0.3=low, 0.5=medium, 0.7=high, 0.9=very_high)
      evidence:
        type: string
        description: Source or citation for this assertion
      source:
        type: string
        description: How this relationship was determined

  - name: same_class
    description: >
      Two drugs are in the same therapeutic class (curated from clinical
      knowledge of drug families like statins, SSRIs, ACE inhibitors, etc).
      Used to find therapeutic alternatives.
    from: Drug
    to: Drug
    cardinality: many
    properties:
      therapeutic_class:
        type: string
        description: Name of the therapeutic class

named_queries:
  check_interactions:
    description: >
      What drugs interact with this one, and how severe?
      Starting from a drug, find all known interactions with severity levels.
      This is the basic screening query.
    entry_point: Drug
    returns: Drug
    traversal:
      - relationship: interacts_with
        direction: both

  find_mechanism:
    description: >
      Why do these two drugs interact? Starting from a drug, trace through
      metabolized_by to its enzymes, then find other drugs on the same
      enzymes. Explains the interaction pathway.
    entry_point: Drug
    returns: Drug
    traversal:
      - relationship: metabolized_by
        direction: outgoing
      - relationship: metabolized_by
        direction: incoming

  enzyme_impact:
    description: >
      What is the blast radius of this drug on the CYP450 system?
      Starting from a drug, show all enzymes it is metabolized by and
      every other drug sharing those enzymes. A prescriber needs this
      to assess risk across the full medication list.
    entry_point: Drug
    returns: Drug
    traversal:
      - relationship: [metabolized_by, inhibits, induces]
        direction: outgoing
      - relationship: [metabolized_by, inhibits, induces]
        direction: incoming

  suggest_alternative:
    description: >
      What can I use instead that avoids this interaction? Given a drug,
      find drugs in the same therapeutic class that are metabolized by
      different enzymes. The receipt proves why the alternative is safe.
    entry_point: Drug
    returns: Drug
    traversal:
      - relationship: same_class
        direction: both
      - relationship: metabolized_by
        direction: outgoing

constraints:
  - name: no_self_interaction
    description: A drug should not interact with itself.
    rule: "interacts_with.FROM.drug_id != interacts_with.TO.drug_id"
    severity: error
