version: "1.0"
name: supply_chain_blast_radius
kind: world_model
description: >
  Supply chain incident blast-radius kit. Deterministic base world of
  suppliers, components, assemblies (with recursive BOM hierarchy),
  products, and shipments. Incidents arrive as new entities
  and cascade through four staged governed-relationship workflows:
  incident → supplier → component → product → at-risk shipment.
  Assembly impact is derived from accepted supplier/component impacts
  plus the deterministic BOM hierarchy, rather than stored as a governed
  claim.
  Each governed edge is rule-centric (the bucket signature
  carries rule_id + rule_version, not incident_id), so trust
  accumulates on rules across many incidents rather than starting fresh
  per incident.

# ─── Entity types ────────────────────────────────────────────────────

entity_types:
  Supplier:
    description: External supplier of raw materials or discrete components.
    properties:
      supplier_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      primary_geography:
        type: string
        optional: true
      tier_hint:
        type: string
        optional: true
        description: Operator-supplied hint (tier-1, tier-2, tier-3); not authoritative — true tier is computed via BOM traversal.

  Component:
    description: A raw material or discrete part that rolls up into assemblies.
    properties:
      component_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      component_kind:
        type: string
        enum: [raw_material, part]
        description: Explicit BOM role for non-assembly components.
      revision:
        type: string
        optional: true
        description: Component revision used by the seed BOM.
      lifecycle_status:
        type: string
        optional: true
        enum: [active, deprecated, obsolete]
      criticality:
        type: string
        optional: true
        enum: [critical, standard, low]
      category:
        type: string
        optional: true

  Assembly:
    description: A buildable subassembly or assembly composed of Components and/or lower-level Assemblies.
    properties:
      assembly_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      revision:
        type: string
        optional: true
        description: Assembly revision used by the seed BOM.
      lifecycle_status:
        type: string
        optional: true
        enum: [active, deprecated, obsolete]
      criticality:
        type: string
        optional: true
        enum: [critical, standard, low]
      category:
        type: string
        optional: true

  Product:
    description: Finished good shipped to customers.
    properties:
      product_id:
        type: string
        primary_key: true
      sku:
        type: string
        indexed: true
      name:
        type: string
      active:
        type: bool
        optional: true

  Shipment:
    description: A specific outbound shipment of products to a customer.
    properties:
      shipment_id:
        type: string
        primary_key: true
      customer_id:
        type: string
        indexed: true
      status:
        type: string
        optional: true
        enum: [in_flight, delivered, cancelled]
      ship_date:
        type: date
        optional: true
      eta:
        type: date
        optional: true

  Incident:
    description: A supplier-side disruption or geography-level supply event.
    properties:
      incident_id:
        type: string
        primary_key: true
      title:
        type: string
        indexed: true
      severity:
        type: string
        optional: true
        enum: [critical, high, medium, low]
      scope_type:
        type: string
        optional: true
        enum: [supplier, geography]
      scope_id:
        type: string
        optional: true
        description: Identifier of the in-scope supplier or geography string.
      reported_at:
        type: date
        optional: true
      summary:
        type: string
        optional: true

# ─── Deterministic relationships ─────────────────────────────────────

relationships:
  - name: supplier_supplies_component
    description: A supplier provides a component. Properties capture lead time and active status.
    from: Supplier
    to: Component
    properties:
      lead_time_days:
        type: int
        optional: true
      active:
        type: bool
        optional: true

  - name: supplier_supplies_assembly
    description: A supplier provides a buildable assembly directly.
    from: Supplier
    to: Assembly
    properties:
      lead_time_days:
        type: int
        optional: true
      active:
        type: bool
        optional: true

  - name: component_part_of_assembly
    description: BOM edge linking a raw material or part into an assembly.
    from: Component
    to: Assembly
    properties:
      quantity:
        type: int
        optional: true

  - name: assembly_part_of_assembly
    description: Recursive BOM edge linking a child assembly into a parent assembly.
    from: Assembly
    to: Assembly
    properties:
      quantity:
        type: int
        optional: true

  - name: assembly_part_of_product
    description: Top-level BOM edge linking an assembly into a finished product.
    from: Assembly
    to: Product
    properties:
      quantity:
        type: int
        optional: true

  - name: product_in_shipment
    description: Fulfillment edge linking a product to shipments that contain it.
    from: Product
    to: Shipment
    properties:
      qty:
        type: int
        optional: true

# ─── Governed relationships ──────────────────────────────────────────
#
# Each governed edge is created through propose_relationship_group +
# resolution. The matching block names the integration that supplies
# tri-state signals; the auto_resolve_when policy gates when proposals
# can apply without human review.
#
# Bucket signatures are rule-centric (rule_id + rule_version live in
# thesis_facts on the propose step), so trust accumulates on the rule
# across many incidents — not per incident.

  - name: incident_impacts_supplier
    description: Governed judgment that an incident materially impacts a supplier.
    from: Incident
    to: Supplier
    properties:
      match_basis:
        type: string
        optional: true
        enum: [direct, geography]
        description: How the incident scope matched this supplier.
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        incident_supplier_scope_match:
          role: required
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: incident_impacts_component
    description: Governed judgment that an incident impacts a component via its impacted suppliers.
    from: Incident
    to: Component
    properties:
      alternate_state:
        type: string
        optional: true
        enum: [no_alternate, alternate_in_scope, alternate_active]
        description: State of substitute supplier coverage at cascade time.
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        incident_component_cascade:
          role: required
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: incident_impacts_product
    description: Governed judgment that an incident impacts a finished product through accepted component impacts, directly supplied assembly impacts, and the deterministic assembly BOM hierarchy.
    from: Incident
    to: Product
    properties:
      bom_depth_bucket:
        type: string
        optional: true
        enum: [direct, tier_2, tier_3_plus]
        description: Discretized BOM traversal depth from impacted component or assembly through the assembly hierarchy to product.
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        incident_product_cascade:
          role: required
          always_review_on_unsure: true
      # Product-level impact is too load-bearing to auto-resolve in v1
      # even when signals are clean. Keep on review track.
      # NOTE (schema gap): there is no `auto_resolve_when: never` value
      # in MatchingSchema. Setting all_support + relying on
      # auto_resolve_requires_prior_trust=trusted_only (the default)
      # means first-incident review-everything; later incidents with
      # accrued trust on this bucket *could* auto-apply unless we
      # leave always_review_on_unsure plus a decision_policy below.
      auto_resolve_when: all_support

  - name: shipment_at_risk
    description: Governed judgment that an in-flight shipment is at risk because it carries an impacted product.
    from: Incident
    to: Shipment
    properties:
      shipment_state:
        type: string
        optional: true
        enum: [in_flight, delivered, pre_incident]
        description: Computed shipment state relative to the incident at cascade time.
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        shipment_risk_assessment:
          role: required
          always_review_on_unsure: true
      auto_resolve_when: all_support

# ─── Decision policies ───────────────────────────────────────────────
#
# Force product-impact and shipment-at-risk proposals to require
# review even when bucket trust would otherwise allow auto-apply.
# This is how we express "always human review for customer-facing
# judgments" given the current MatchingSchema does not have a
# `never_auto_resolve` option.

decision_policies:
  - name: product_impact_always_review
    description: Customer-facing product impact must always be reviewed.
    rationale: Product impact drives customer comms and recall planning; human approval required.
    applies_to: workflow
    workflow_name: propose_incident_impacts_product
    relationship_type: incident_impacts_product
    effect: require_review

  - name: shipment_risk_always_review
    description: Customer shipment risk must always be reviewed.
    rationale: At-risk shipments reach customers; human approval required before action.
    applies_to: workflow
    workflow_name: propose_shipment_at_risk
    relationship_type: shipment_at_risk
    effect: require_review

# ─── Named queries ───────────────────────────────────────────────────
#
# All graph-native single-purpose reads. Composition (e.g. "products
# at risk plus their single-source flags") happens in the skill, not
# in a query.

named_queries:
  incident_impacted_suppliers:
    description: Starting from an incident, find suppliers judged impacted.
    entry_point: Incident
    returns: Supplier
    traversal:
      - relationship: incident_impacts_supplier
        direction: outgoing

  incident_impacted_components:
    description: Starting from an incident, find components judged impacted via the supplier cascade.
    entry_point: Incident
    returns: Component
    traversal:
      - relationship: incident_impacts_component
        direction: outgoing

  incident_impacted_assemblies:
    description: >
      Starting from an incident, derive assemblies exposed to accepted supplier
      or component impacts by walking supplier_supplies_assembly,
      component_part_of_assembly, and assembly_part_of_assembly.
      This is a named query/view, not a governed relationship.
    entry_point: Incident
    returns: Assembly
    traversal:
      - relationship: [incident_impacts_supplier, incident_impacts_component]
        direction: outgoing
      - relationship: [supplier_supplies_assembly, component_part_of_assembly, assembly_part_of_assembly]
        direction: outgoing
        max_depth: 8

  incident_impacted_products:
    description: >
      Starting from an incident, find finished products judged impacted via component and assembly BOM cascade.
      The bom_depth_bucket edge property lets the skill filter for tier_2 / tier_3_plus.
    entry_point: Incident
    returns: Product
    traversal:
      - relationship: incident_impacts_product
        direction: outgoing

  incident_at_risk_shipments:
    description: Starting from an incident, find at-risk in-flight shipments.
    entry_point: Incident
    returns: Shipment
    traversal:
      - relationship: shipment_at_risk
        direction: outgoing

  single_source_components_for_incident:
    description: >
      Starting from an incident, find impacted components that have only one
      active supplier path. Surfaces the "no alternate active supplier"
      enrichment for the operator summary.
    entry_point: Incident
    returns: Component
    traversal:
      - relationship: incident_impacts_component
        direction: outgoing
        filter:
          alternate_state: no_alternate

  supplier_supplied_components:
    description: Starting from a supplier, find directly supplied components.
    entry_point: Supplier
    returns: Component
    traversal:
      - relationship: supplier_supplies_component
        direction: outgoing

  supplier_supplied_assemblies:
    description: Starting from a supplier, find directly supplied assemblies.
    entry_point: Supplier
    returns: Assembly
    traversal:
      - relationship: supplier_supplies_assembly
        direction: outgoing

  component_parent_assemblies:
    description: >
      Starting from a component, find direct and higher-level parent assemblies
      in the BOM hierarchy.
    entry_point: Component
    returns: Assembly
    traversal:
      - relationship: [component_part_of_assembly, assembly_part_of_assembly]
        direction: outgoing
        max_depth: 8

  assembly_child_components:
    description: Starting from an assembly, find direct child components.
    entry_point: Assembly
    returns: Component
    traversal:
      - relationship: component_part_of_assembly
        direction: incoming

  assembly_child_assemblies:
    description: Starting from an assembly, find direct child assemblies.
    entry_point: Assembly
    returns: Assembly
    traversal:
      - relationship: assembly_part_of_assembly
        direction: incoming

  product_top_level_assemblies:
    description: Starting from a product, find top-level assemblies in its BOM.
    entry_point: Product
    returns: Assembly
    traversal:
      - relationship: assembly_part_of_product
        direction: incoming

  product_shipments:
    description: Starting from a product, find shipments containing it.
    entry_point: Product
    returns: Shipment
    traversal:
      - relationship: product_in_shipment
        direction: outgoing

  shipment_products:
    description: Starting from a shipment, find products contained in it.
    entry_point: Shipment
    returns: Product
    traversal:
      - relationship: product_in_shipment
        direction: incoming

  supplier_impacting_incidents:
    description: Starting from a supplier, find incidents judged to impact it.
    entry_point: Supplier
    returns: Incident
    traversal:
      - relationship: incident_impacts_supplier
        direction: incoming

  product_impacting_incidents:
    description: Starting from a product, find incidents judged to impact it.
    entry_point: Product
    returns: Incident
    traversal:
      - relationship: incident_impacts_product
        direction: incoming

  shipment_risk_incidents:
    description: Starting from a shipment, find incidents judged to put it at risk.
    entry_point: Shipment
    returns: Incident
    traversal:
      - relationship: shipment_at_risk
        direction: incoming

# ─── Quality checks ──────────────────────────────────────────────────

quality_checks:
  - name: components_have_supplier
    kind: cardinality
    description: Every component should have at least one supplier (orphan detector).
    entity_type: Component
    relationship_type: supplier_supplies_component
    direction: incoming
    min_count: 1
    severity: warning

  - name: critical_components_have_redundancy
    kind: cardinality
    description: Critical components should have at least two active suppliers (single-source flag).
    entity_type: Component
    relationship_type: supplier_supplies_component
    direction: incoming
    min_count: 2
    severity: warning

  - name: components_have_kind
    kind: property
    description: Every component should declare whether it is a raw material or part.
    target: entity
    entity_type: Component
    property: component_kind
    rule: required
    severity: error

  - name: products_have_assembly_bom
    kind: cardinality
    description: Products should have at least one top-level assembly in their BOM.
    entity_type: Product
    relationship_type: assembly_part_of_product
    direction: incoming
    min_count: 1
    severity: error

# ─── Integrations ────────────────────────────────────────────────────
#
# One integration per governed relationship in v1. Each integration is
# the named "voice" that emits tri-state signals through map_signals.
# Adding a second voice per relationship (e.g. separating direct supplier
# match from geography-match for incident_impacts_supplier) is a v1.5
# enrichment that does not require schema changes.

integrations:
  incident_supplier_scope_match:
    kind: incident_scope_match
    contract: null
    notes: >
      Matches incident scope (supplier|geography) to suppliers via
      supplier_id or supplier.primary_geography.

  incident_component_cascade:
    kind: supplier_to_component_cascade
    contract: null
    notes: >
      Cascades from impacted suppliers through supplier_supplies_component
      to components, downgrading the signal when an active alternate
      supplier exists outside incident scope.

  incident_product_cascade:
    kind: bom_to_product_cascade
    contract: null
    notes: >
      Rolls resolved impacted components and directly supplied assemblies
      through supplier_supplies_assembly, component_part_of_assembly,
      assembly_part_of_assembly, and assembly_part_of_product to finished
      goods. Records discretized BOM depth in bom_depth_bucket.

  shipment_risk_assessment:
    kind: shipment_state_assessment
    contract: null
    notes: >
      Assesses each in-flight shipment containing an impacted product
      against shipment status and ship_date relative to incident.reported_at.

# ─── Contracts ───────────────────────────────────────────────────────

contracts:
  EmptyInput:
    fields: {}

  SupplyChainSeedData:
    description: Deterministic base-world entities and edges loaded from seed CSVs.
    fields:
      suppliers:
        type: json
        json_schema:
          type: array
          items:
            type: object
            properties:
              supplier_id: {type: string}
              name: {type: string}
              primary_geography: {type: string}
              tier_hint: {type: string}
      components:
        type: json
        json_schema:
          type: array
          items:
            type: object
            properties:
              component_id: {type: string}
              name: {type: string}
              component_kind:
                type: string
                enum: [raw_material, part]
              revision: {type: string}
              lifecycle_status:
                type: string
                enum: [active, deprecated, obsolete]
              criticality: {type: string}
              category: {type: string}
      assemblies:
        type: json
        json_schema:
          type: array
          items:
            type: object
            properties:
              assembly_id: {type: string}
              name: {type: string}
              revision: {type: string}
              lifecycle_status:
                type: string
                enum: [active, deprecated, obsolete]
              criticality: {type: string}
              category: {type: string}
      products:
        type: json
        json_schema:
          type: array
          items:
            type: object
            properties:
              product_id: {type: string}
              sku: {type: string}
              name: {type: string}
              active: {type: boolean}
      shipments:
        type: json
        json_schema:
          type: array
          items:
            type: object
            properties:
              shipment_id: {type: string}
              customer_id: {type: string}
              status: {type: string}
              ship_date: {type: string}
              eta: {type: string}
      supplier_supplies_component:
        type: json
        json_schema:
          type: array
          items:
            type: object
            properties:
              supplier_id: {type: string}
              component_id: {type: string}
              lead_time_days: {type: integer}
              active: {type: boolean}
      supplier_supplies_assembly:
        type: json
        json_schema:
          type: array
          items:
            type: object
            properties:
              supplier_id: {type: string}
              assembly_id: {type: string}
              lead_time_days: {type: integer}
              active: {type: boolean}
      component_part_of_assembly:
        type: json
        json_schema:
          type: array
          items:
            type: object
            properties:
              component_id: {type: string}
              assembly_id: {type: string}
              quantity: {type: integer}
      assembly_part_of_assembly:
        type: json
        json_schema:
          type: array
          items:
            type: object
            properties:
              parent_assembly_id: {type: string}
              child_assembly_id: {type: string}
              quantity: {type: integer}
      assembly_part_of_product:
        type: json
        json_schema:
          type: array
          items:
            type: object
            properties:
              assembly_id: {type: string}
              product_id: {type: string}
              quantity: {type: integer}
      product_in_shipment:
        type: json
        json_schema:
          type: array
          items:
            type: object
            properties:
              shipment_id: {type: string}
              product_id: {type: string}
              qty: {type: integer}

  IncidentScopeAssessmentInput:
    description: Open incidents plus suppliers for direct supplier and geography scope matching.
    fields:
      incidents:
        type: json
      suppliers:
        type: json

  IncidentScopeAssessmentResults:
    description: Candidate (incident, supplier) judgments with match_basis and tri-state verdict.
    fields:
      items:
        type: json
        json_schema:
          type: array
          items:
            type: object
            properties:
              incident_id: {type: string}
              supplier_id: {type: string}
              match_basis: {type: string}
              rationale: {type: string}
              verdict: {type: string}

  IncidentComponentCascadeInput:
    description: Resolved incident_impacts_supplier edges plus supplier_supplies_component context.
    fields:
      impacted_supplier_edges:
        type: json
      supplier_supplies_component_edges:
        type: json
      components:
        type: json

  IncidentComponentCascadeResults:
    description: Candidate (incident, component) judgments with alternate_state and verdict.
    fields:
      items:
        type: json
        json_schema:
          type: array
          items:
            type: object
            properties:
              incident_id: {type: string}
              component_id: {type: string}
              alternate_state: {type: string}
              rationale: {type: string}
              verdict: {type: string}

  IncidentProductCascadeInput:
    description: Resolved component and supplier impacts plus assembly-aware BOM edges for product cascade.
    fields:
      impacted_component_edges:
        type: json
      impacted_supplier_edges:
        type: json
      supplier_supplies_assembly_edges:
        type: json
      component_part_of_assembly_edges:
        type: json
      assembly_part_of_assembly_edges:
        type: json
      assembly_part_of_product_edges:
        type: json
      assemblies:
        type: json
      products:
        type: json

  IncidentProductCascadeResults:
    description: Candidate (incident, product) judgments with bom_depth_bucket and verdict.
    fields:
      items:
        type: json
        json_schema:
          type: array
          items:
            type: object
            properties:
              incident_id: {type: string}
              product_id: {type: string}
              bom_depth_bucket: {type: string}
              rationale: {type: string}
              verdict: {type: string}

  ShipmentRiskAssessmentInput:
    description: Resolved product impacts plus shipments and product_in_shipment edges.
    fields:
      impacted_product_edges:
        type: json
      shipments:
        type: json
      product_in_shipment_edges:
        type: json
      incidents:
        type: json

  ShipmentRiskAssessmentResults:
    description: Candidate (incident, shipment) judgments with shipment_state and verdict.
    fields:
      items:
        type: json
        json_schema:
          type: array
          items:
            type: object
            properties:
              incident_id: {type: string}
              shipment_id: {type: string}
              shipment_state: {type: string}
              rationale: {type: string}
              verdict: {type: string}

# ─── Artifacts ───────────────────────────────────────────────────────
#
# The seed bundle artifact will be added once seed data is authored.
# Validator requires sha256 to be present on every artifact entry, so
# we leave this section empty for v1 draft and re-attach the artifact
# (and the load_supply_chain_seed_data provider's `artifact:` field)
# in the seed-data PR.

artifacts: {}

# ─── Providers ───────────────────────────────────────────────────────
#
# Five providers: one to load seed CSVs, four cascade-stage assessors.
# All deterministic. The cascade providers operate on whatever is
# currently in the graph (open incidents, resolved upstream impacts) —
# bucket dedup handles the case where they re-propose existing pairs.

providers:
  load_supply_chain_seed_data:
    kind: function
    description: Load all base-world entities and deterministic edges from the seed bundle.
    contract_in: EmptyInput
    contract_out: SupplyChainSeedData
    ref: cruxible_core.demo_providers.supply_chain_blast_radius.load_seed_data
    version: "1.0.0"
    deterministic: true
    runtime: python
    # artifact: supply_chain_seed_bundle  # re-attach once seed bundle authored

  assess_incident_supplier_scope:
    kind: function
    description: Match each open incident's scope to suppliers via direct supplier or geography basis.
    contract_in: IncidentScopeAssessmentInput
    contract_out: IncidentScopeAssessmentResults
    ref: cruxible_core.demo_providers.supply_chain_blast_radius.assess_incident_supplier_scope
    version: "1.0.0"
    deterministic: true
    runtime: python

  assess_incident_component_cascade:
    kind: function
    description: Cascade impacted suppliers to components, downgrading where active alternates exist.
    contract_in: IncidentComponentCascadeInput
    contract_out: IncidentComponentCascadeResults
    ref: cruxible_core.demo_providers.supply_chain_blast_radius.assess_incident_component_cascade
    version: "1.0.0"
    deterministic: true
    runtime: python

  assess_incident_product_cascade:
    kind: function
    description: Roll impacted components and directly supplied assemblies through assembly BOM hierarchy to finished products; records bom_depth_bucket.
    contract_in: IncidentProductCascadeInput
    contract_out: IncidentProductCascadeResults
    ref: cruxible_core.demo_providers.supply_chain_blast_radius.assess_incident_product_cascade
    version: "1.0.0"
    deterministic: true
    runtime: python

  assess_shipment_risk:
    kind: function
    description: Assess in-flight shipments containing impacted products against status and ship_date.
    contract_in: ShipmentRiskAssessmentInput
    contract_out: ShipmentRiskAssessmentResults
    ref: cruxible_core.demo_providers.supply_chain_blast_radius.assess_shipment_risk
    version: "1.0.0"
    deterministic: true
    runtime: python

# ─── Workflows ───────────────────────────────────────────────────────
#
# Five workflows: one canonical base loader plus four propose stages.
# Each propose workflow is contract_in: EmptyInput and operates on
# the current graph state (KEV pattern). Operators run them in order;
# the skill orchestrates and pauses for human review between stages.

workflows:

  build_seed_state:
    # KNOWN VALIDATE GAP: this workflow uses apply_* steps which require
    # canonical: true, and canonical requires the load_supply_chain_seed_data
    # provider to declare an artifact bundle with a real sha256. Both will be
    # set once the seed CSVs are authored. Until then `cruxible validate`
    # surfaces a cross-reference error on this single workflow; the rest of
    # the config (entity types, relationships, four propose workflows, named
    # queries, feedback profiles, decision policies, quality checks) validates
    # cleanly.
    canonical: true
    description: Load base-world suppliers, components, assemblies, products, shipments, and deterministic edges.
    contract_in: EmptyInput
    steps:
      - id: seed
        provider: load_supply_chain_seed_data
        input: {}
        as: seed

      # --- Entities ---
      - id: suppliers
        make_entities:
          entity_type: Supplier
          items: $steps.seed.suppliers
          entity_id: $item.supplier_id
          properties:
            supplier_id: $item.supplier_id
            name: $item.name
            primary_geography: $item.primary_geography
            tier_hint: $item.tier_hint
        as: suppliers
      - id: components
        make_entities:
          entity_type: Component
          items: $steps.seed.components
          entity_id: $item.component_id
          properties:
            component_id: $item.component_id
            name: $item.name
            component_kind: $item.component_kind
            revision: $item.revision
            lifecycle_status: $item.lifecycle_status
            criticality: $item.criticality
            category: $item.category
        as: components
      - id: assemblies
        make_entities:
          entity_type: Assembly
          items: $steps.seed.assemblies
          entity_id: $item.assembly_id
          properties:
            assembly_id: $item.assembly_id
            name: $item.name
            revision: $item.revision
            lifecycle_status: $item.lifecycle_status
            criticality: $item.criticality
            category: $item.category
        as: assemblies
      - id: products
        make_entities:
          entity_type: Product
          items: $steps.seed.products
          entity_id: $item.product_id
          properties:
            product_id: $item.product_id
            sku: $item.sku
            name: $item.name
            active: $item.active
        as: products
      - id: shipments
        make_entities:
          entity_type: Shipment
          items: $steps.seed.shipments
          entity_id: $item.shipment_id
          properties:
            shipment_id: $item.shipment_id
            customer_id: $item.customer_id
            status: $item.status
            ship_date: $item.ship_date
            eta: $item.eta
        as: shipments

      # --- Relationships ---
      - id: supplies_edges
        make_relationships:
          relationship_type: supplier_supplies_component
          items: $steps.seed.supplier_supplies_component
          from_type: Supplier
          from_id: $item.supplier_id
          to_type: Component
          to_id: $item.component_id
          properties:
            lead_time_days: $item.lead_time_days
            active: $item.active
        as: supplies_edges
      - id: assembly_supply_edges
        make_relationships:
          relationship_type: supplier_supplies_assembly
          items: $steps.seed.supplier_supplies_assembly
          from_type: Supplier
          from_id: $item.supplier_id
          to_type: Assembly
          to_id: $item.assembly_id
          properties:
            lead_time_days: $item.lead_time_days
            active: $item.active
        as: assembly_supply_edges
      - id: component_assembly_edges
        make_relationships:
          relationship_type: component_part_of_assembly
          items: $steps.seed.component_part_of_assembly
          from_type: Component
          from_id: $item.component_id
          to_type: Assembly
          to_id: $item.assembly_id
          properties:
            quantity: $item.quantity
        as: component_assembly_edges
      - id: assembly_recursive_edges
        make_relationships:
          relationship_type: assembly_part_of_assembly
          items: $steps.seed.assembly_part_of_assembly
          from_type: Assembly
          from_id: $item.child_assembly_id
          to_type: Assembly
          to_id: $item.parent_assembly_id
          properties:
            quantity: $item.quantity
        as: assembly_recursive_edges
      - id: assembly_product_edges
        make_relationships:
          relationship_type: assembly_part_of_product
          items: $steps.seed.assembly_part_of_product
          from_type: Assembly
          from_id: $item.assembly_id
          to_type: Product
          to_id: $item.product_id
          properties:
            quantity: $item.quantity
        as: assembly_product_edges
      - id: shipment_edges
        make_relationships:
          relationship_type: product_in_shipment
          items: $steps.seed.product_in_shipment
          from_type: Product
          from_id: $item.product_id
          to_type: Shipment
          to_id: $item.shipment_id
          properties:
            qty: $item.qty
        as: shipment_edges

      # --- Apply ---
      - id: apply_suppliers
        apply_entities:
          entities_from: suppliers
        as: apply_suppliers
      - id: apply_components
        apply_entities:
          entities_from: components
        as: apply_components
      - id: apply_assemblies
        apply_entities:
          entities_from: assemblies
        as: apply_assemblies
      - id: apply_products
        apply_entities:
          entities_from: products
        as: apply_products
      - id: apply_shipments
        apply_entities:
          entities_from: shipments
        as: apply_shipments
      - id: apply_supplies
        apply_relationships:
          relationships_from: supplies_edges
        as: apply_supplies
      - id: apply_assembly_supply
        apply_relationships:
          relationships_from: assembly_supply_edges
        as: apply_assembly_supply
      - id: apply_component_assembly
        apply_relationships:
          relationships_from: component_assembly_edges
        as: apply_component_assembly
      - id: apply_assembly_recursive
        apply_relationships:
          relationships_from: assembly_recursive_edges
        as: apply_assembly_recursive
      - id: apply_assembly_product
        apply_relationships:
          relationships_from: assembly_product_edges
        as: apply_assembly_product
      - id: apply_shipment_edges
        apply_relationships:
          relationships_from: shipment_edges
        as: apply_shipment_edges
    returns: apply_shipment_edges

  # ── Stage 1: incident → supplier ───────────────────────────────────

  propose_incident_impacts_supplier:
    canonical: false
    description: >
      Match every open incident's scope to suppliers via direct supplier
      or geography basis. Bucket signature is rule-centric
      (rule_id=incident_scope_match_to_supplier), so trust accumulates
      across many incidents.
    contract_in: EmptyInput
    steps:
      - id: incidents
        list_entities:
          entity_type: Incident
        as: incidents
      - id: suppliers
        list_entities:
          entity_type: Supplier
        as: suppliers
      - id: assessments
        provider: assess_incident_supplier_scope
        input:
          incidents: $steps.incidents.items
          suppliers: $steps.suppliers.items
        as: assessments
      - id: candidates
        make_candidates:
          relationship_type: incident_impacts_supplier
          items: $steps.assessments.items
          from_type: Incident
          from_id: $item.incident_id
          to_type: Supplier
          to_id: $item.supplier_id
          properties:
            match_basis: $item.match_basis
            rationale: $item.rationale
        as: candidates
      - id: signals
        map_signals:
          integration: incident_supplier_scope_match
          items: $steps.assessments.items
          from_id: $item.incident_id
          to_id: $item.supplier_id
          evidence: $item.rationale
          enum:
            path: verdict
            map:
              support: support
              unsure: unsure
              contradict: contradict
        as: signals
      - id: proposal
        propose_relationship_group:
          relationship_type: incident_impacts_supplier
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: >
            Open incidents match suppliers via direct supplier or
            geography scope.
          thesis_facts:
            rule_id: incident_scope_match_to_supplier
            rule_version: 1
            source: incident_scope_and_supplier_geography
          proposed_by: agent
        as: proposal
    returns: proposal

  # ── Stage 2: supplier → component ──────────────────────────────────

  propose_incident_impacts_component:
    canonical: false
    description: >
      Cascade resolved incident_impacts_supplier edges through
      supplier_supplies_component to candidate component impacts.
      Records alternate_state to capture whether alternate active
      suppliers exist outside incident scope.
    contract_in: EmptyInput
    steps:
      - id: impacted_supplier_edges
        list_relationships:
          relationship_type: incident_impacts_supplier
        as: impacted_supplier_edges
      - id: supplies_edges
        list_relationships:
          relationship_type: supplier_supplies_component
        as: supplies_edges
      - id: components
        list_entities:
          entity_type: Component
        as: components
      - id: assessments
        provider: assess_incident_component_cascade
        input:
          impacted_supplier_edges: $steps.impacted_supplier_edges.items
          supplier_supplies_component_edges: $steps.supplies_edges.items
          components: $steps.components.items
        as: assessments
      - id: candidates
        make_candidates:
          relationship_type: incident_impacts_component
          items: $steps.assessments.items
          from_type: Incident
          from_id: $item.incident_id
          to_type: Component
          to_id: $item.component_id
          properties:
            alternate_state: $item.alternate_state
            rationale: $item.rationale
        as: candidates
      - id: signals
        map_signals:
          integration: incident_component_cascade
          items: $steps.assessments.items
          from_id: $item.incident_id
          to_id: $item.component_id
          evidence: $item.rationale
          enum:
            path: verdict
            map:
              support: support
              unsure: unsure
              contradict: contradict
        as: signals
      - id: proposal
        propose_relationship_group:
          relationship_type: incident_impacts_component
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: >
            Components are impacted via the supplier cascade,
            adjusted for alternate active supplier coverage.
          thesis_facts:
            rule_id: cascade_from_impacted_supplier_to_component
            rule_version: 1
            source: supplier_supplies_component_edges
          proposed_by: agent
        as: proposal
    returns: proposal

  # ── Stage 3: component/supplier → assembly BOM → product ───────────

  propose_incident_impacts_product:
    canonical: false
    description: >
      Roll resolved impacted components and directly supplied assemblies
      through the assembly BOM hierarchy to finished products. Assemblies
      are part of the deterministic BOM structure, but assembly impact
      remains a derived view rather than a governed edge.
    contract_in: EmptyInput
    steps:
      - id: impacted_component_edges
        list_relationships:
          relationship_type: incident_impacts_component
        as: impacted_component_edges
      - id: impacted_supplier_edges
        list_relationships:
          relationship_type: incident_impacts_supplier
        as: impacted_supplier_edges
      - id: assembly_supply
        list_relationships:
          relationship_type: supplier_supplies_assembly
        as: assembly_supply
      - id: component_assembly
        list_relationships:
          relationship_type: component_part_of_assembly
        as: component_assembly
      - id: assembly_recursive
        list_relationships:
          relationship_type: assembly_part_of_assembly
        as: assembly_recursive
      - id: assembly_product
        list_relationships:
          relationship_type: assembly_part_of_product
        as: assembly_product
      - id: assemblies
        list_entities:
          entity_type: Assembly
        as: assemblies
      - id: products
        list_entities:
          entity_type: Product
        as: products
      - id: assessments
        provider: assess_incident_product_cascade
        input:
          impacted_component_edges: $steps.impacted_component_edges.items
          impacted_supplier_edges: $steps.impacted_supplier_edges.items
          supplier_supplies_assembly_edges: $steps.assembly_supply.items
          component_part_of_assembly_edges: $steps.component_assembly.items
          assembly_part_of_assembly_edges: $steps.assembly_recursive.items
          assembly_part_of_product_edges: $steps.assembly_product.items
          assemblies: $steps.assemblies.items
          products: $steps.products.items
        as: assessments
      - id: candidates
        make_candidates:
          relationship_type: incident_impacts_product
          items: $steps.assessments.items
          from_type: Incident
          from_id: $item.incident_id
          to_type: Product
          to_id: $item.product_id
          properties:
            bom_depth_bucket: $item.bom_depth_bucket
            rationale: $item.rationale
        as: candidates
      - id: signals
        map_signals:
          integration: incident_product_cascade
          items: $steps.assessments.items
          from_id: $item.incident_id
          to_id: $item.product_id
          evidence: $item.rationale
          enum:
            path: verdict
            map:
              support: support
              unsure: unsure
              contradict: contradict
        as: signals
      - id: proposal
        propose_relationship_group:
          relationship_type: incident_impacts_product
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: >
            Products are impacted via component-to-assembly or
            supplier-to-assembly BOM rollup.
          thesis_facts:
            rule_id: cascade_from_impacted_supplier_or_component_to_product
            rule_version: 1
            source: assembly_bom_traversal
          proposed_by: agent
        as: proposal
    returns: proposal

  # ── Stage 4: product → shipment ────────────────────────────────────

  propose_shipment_at_risk:
    canonical: false
    description: >
      Assess in-flight shipments containing impacted products against
      status and ship_date relative to incident.reported_at.
    contract_in: EmptyInput
    steps:
      - id: impacted_product_edges
        list_relationships:
          relationship_type: incident_impacts_product
        as: impacted_product_edges
      - id: shipments
        list_entities:
          entity_type: Shipment
        as: shipments
      - id: product_shipment_edges
        list_relationships:
          relationship_type: product_in_shipment
        as: product_shipment_edges
      - id: incidents
        list_entities:
          entity_type: Incident
        as: incidents
      - id: assessments
        provider: assess_shipment_risk
        input:
          impacted_product_edges: $steps.impacted_product_edges.items
          shipments: $steps.shipments.items
          product_in_shipment_edges: $steps.product_shipment_edges.items
          incidents: $steps.incidents.items
        as: assessments
      - id: candidates
        make_candidates:
          relationship_type: shipment_at_risk
          items: $steps.assessments.items
          from_type: Incident
          from_id: $item.incident_id
          to_type: Shipment
          to_id: $item.shipment_id
          properties:
            shipment_state: $item.shipment_state
            rationale: $item.rationale
        as: candidates
      - id: signals
        map_signals:
          integration: shipment_risk_assessment
          items: $steps.assessments.items
          from_id: $item.incident_id
          to_id: $item.shipment_id
          evidence: $item.rationale
          enum:
            path: verdict
            map:
              support: support
              unsure: unsure
              contradict: contradict
        as: signals
      - id: proposal
        propose_relationship_group:
          relationship_type: shipment_at_risk
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: >
            In-flight shipments containing impacted products are at
            risk; delivered or pre-incident shipments are not.
          thesis_facts:
            rule_id: shipment_contains_impacted_product
            rule_version: 1
            source: in_flight_shipment_assessment
          proposed_by: agent
        as: proposal
    returns: proposal

# ─── Feedback profiles ───────────────────────────────────────────────
#
# Per-relationship feedback vocabulary used when reviewers reject or
# qualify resolutions. scope_keys pull from the resolved edge's
# endpoints/properties — they are NOT bucket signature fields. The
# bucket signature is rule-centric (set in propose.thesis_facts).

feedback_profiles:
  incident_impacts_supplier:
    version: 1
    reason_codes:
      wrong_supplier_scope_match:
        description: Rule matched the wrong supplier for the incident scope.
        remediation_hint: provider_fix
        required_scope_keys: [supplier, match_basis]
      geography_stale:
        description: Supplier's primary_geography was outdated; supplier is no longer in scope.
        remediation_hint: provider_fix
        required_scope_keys: [supplier, match_basis]
      supplier_recently_cleared:
        description: Supplier was cleared for a similar incident recently and should not have been re-flagged.
        remediation_hint: decision_policy
        required_scope_keys: [supplier]
    scope_keys:
      incident: FROM.incident_id
      supplier: TO.supplier_id
      match_basis: EDGE.match_basis

  incident_impacts_component:
    version: 1
    reason_codes:
      alternate_supplier_active:
        description: Component has an active alternate supplier outside incident scope; cascade should have stopped.
        remediation_hint: provider_fix
        required_scope_keys: [component]
      component_decommissioned:
        description: Component is no longer in active use.
        remediation_hint: quality_check
        required_scope_keys: [component]
      supplier_substitution_planned:
        description: A planned substitution mitigates this cascade.
        remediation_hint: decision_policy
        required_scope_keys: [component, alternate_state]
    scope_keys:
      incident: FROM.incident_id
      component: TO.component_id
      alternate_state: EDGE.alternate_state

  incident_impacts_product:
    version: 1
    reason_codes:
      product_inactive:
        description: Product is inactive; cascade should not have included it.
        remediation_hint: quality_check
        required_scope_keys: [product]
      bom_variant_mismatch:
        description: Product uses a BOM variant that does not include the impacted component path.
        remediation_hint: provider_fix
        required_scope_keys: [product]
      bom_depth_overstated:
        description: BOM traversal recorded a tier closer than reality.
        remediation_hint: provider_fix
        required_scope_keys: [product, bom_depth_bucket]
    scope_keys:
      incident: FROM.incident_id
      product: TO.product_id
      bom_depth_bucket: EDGE.bom_depth_bucket

  shipment_at_risk:
    version: 1
    reason_codes:
      already_delivered:
        description: Shipment was already delivered when incident occurred.
        remediation_hint: provider_fix
        required_scope_keys: [shipment, shipment_state]
      ships_before_incident:
        description: Shipment ship_date predates incident; not actually at risk.
        remediation_hint: provider_fix
        required_scope_keys: [shipment, shipment_state]
      alternate_source_shipment:
        description: Shipment uses product variant from an alternate source not in incident scope.
        remediation_hint: provider_fix
        required_scope_keys: [shipment]
    scope_keys:
      incident: FROM.incident_id
      shipment: TO.shipment_id
      shipment_state: EDGE.shipment_state

# ─── Outcome profiles (Loop 2) ───────────────────────────────────────
#
# Feedback profiles capture reviewer corrections before/at resolution.
# Outcome profiles capture whether accepted judgments worked downstream
# once actual supplier recovery, production, shipment, or customer impact
# is known. These are the trust-calibration inputs for the next incident.

outcome_profiles:
  incident_supplier_resolution:
    anchor_type: resolution
    relationship_type: incident_impacts_supplier
    version: 1
    outcome_codes:
      confirmed_supplier_disruption:
        description: Later operations data confirmed the supplier was materially disrupted.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      supplier_unaffected:
        description: Later operations data showed the supplier was not materially disrupted.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
      scope_data_stale:
        description: Supplier or geography scope data was stale at resolution time.
        remediation_hint: provider_fix
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  incident_component_resolution:
    anchor_type: resolution
    relationship_type: incident_impacts_component
    version: 1
    outcome_codes:
      confirmed_component_shortage:
        description: Later operations data confirmed component supply was constrained.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      alternate_covered_need:
        description: Alternate sourcing prevented the predicted component impact.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
      missed_component_impact:
        description: A component impact was discovered after the proposal chain ran.
        remediation_hint: workflow_fix
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  incident_product_resolution:
    anchor_type: resolution
    relationship_type: incident_impacts_product
    version: 1
    outcome_codes:
      confirmed_product_impact:
        description: Later planning, production, or customer data confirmed product impact.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      product_unaffected:
        description: The product remained unaffected despite the accepted impact judgment.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
      missed_product_impact:
        description: A product impact was discovered after the proposal chain ran.
        remediation_hint: workflow_fix
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  shipment_risk_resolution:
    anchor_type: resolution
    relationship_type: shipment_at_risk
    version: 1
    outcome_codes:
      confirmed_shipment_delay:
        description: Shipment was delayed, held, shorted, or customer-impacting as predicted.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      shipment_unaffected:
        description: Shipment completed normally despite the accepted risk judgment.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
      missed_at_risk_shipment:
        description: A shipment became customer-impacting but was not flagged by the chain.
        remediation_hint: workflow_fix
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  impacted_assemblies_query:
    anchor_type: receipt
    surface_type: query
    surface_name: incident_impacted_assemblies
    version: 1
    outcome_codes:
      missing_impacted_assembly:
        description: Query omitted an assembly later confirmed to be exposed through the BOM.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      false_positive_assembly:
        description: Query returned an assembly later confirmed not to be exposed through the active BOM.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name

  impacted_products_query:
    anchor_type: receipt
    surface_type: query
    surface_name: incident_impacted_products
    version: 1
    outcome_codes:
      missing_impacted_product:
        description: Query omitted a product later confirmed to be impacted.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      false_positive_product:
        description: Query returned a product later confirmed to be unaffected.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name

  at_risk_shipments_query:
    anchor_type: receipt
    surface_type: query
    surface_name: incident_at_risk_shipments
    version: 1
    outcome_codes:
      missing_at_risk_shipment:
        description: Query omitted a shipment later confirmed at risk.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      false_positive_shipment:
        description: Query returned a shipment later confirmed unaffected.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name
