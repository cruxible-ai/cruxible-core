name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-packages --all-extras

      - name: Lint
        run: uv run ruff check src packages/cruxible-client/src tests

      - name: Format check
        run: uv run ruff format --check src packages/cruxible-client/src tests

      - name: Type check
        run: uv run mypy src packages/cruxible-client/src

      - name: Test
        run: uv run pytest --tb=short
