version: "1.0"
name: "car_parts_compatibility"
description: "Vehicle-to-part fitment with compatibility checking and replacement discovery"

entity_types:
  Vehicle:
    description: "A specific vehicle (year + make + model + trim)"
    properties:
      vehicle_id:
        type: string
        primary_key: true
      year:
        type: int
        indexed: true
      make:
        type: string
        indexed: true
      model:
        type: string
        indexed: true
      trim:
        type: string
        optional: true
      engine:
        type: string
        optional: true

  Part:
    description: "An aftermarket or OEM replacement part"
    properties:
      part_number:
        type: string
        primary_key: true
      name:
        type: string
      category:
        type: string
        enum: [brakes, suspension, engine, electrical, body, interior]
        indexed: true
      brand:
        type: string
        optional: true
      price:
        type: float
        optional: true

relationships:
  - name: fits
    from: Part
    to: Vehicle
    cardinality: many_to_many
    properties:
      fitment_notes:
        type: string
        optional: true
      verified:
        type: bool
        default: false
      source:
        type: string
        enum: [catalog, user_report, oem_cross_ref, ai_inferred, property_match, shared_neighbors]
      confidence:
        type: float
        optional: true
    description: "Part fits a specific vehicle"
    reverse_name: fitted_parts

  - name: replaces
    from: Part
    to: Part
    cardinality: many_to_many
    properties:
      direction:
        type: string
        enum: [upgrade, downgrade, equivalent]
      confidence:
        type: float
    description: "Part can replace another part"

named_queries:
  parts_for_vehicle:
    description: "Find all parts that fit a specific vehicle"
    entry_point: Vehicle
    traversal:
      - relationship: fits
        direction: incoming
        filter:
          verified: true
    returns: "list[Part]"

  vehicles_for_part:
    description: "Find all vehicles a part fits"
    entry_point: Part
    traversal:
      - relationship: fits
        direction: outgoing
    returns: "list[Vehicle]"

  compatible_replacements:
    description: "Find replacement parts that also fit the same vehicle"
    entry_point: Part
    traversal:
      - relationship: replaces
        direction: both
        filter:
          direction: [equivalent, upgrade]
      - relationship: fits
        direction: outgoing
        constraint: "target.vehicle_id == $vehicle_id"
    returns: "list[Part]"

constraints:
  - name: replacement_same_category
    rule: "replaces.from.category == replaces.to.category"
    severity: warning
    description: "Replacement parts should be in the same category"

ingestion:
  vehicles:
    entity_type: Vehicle
    file_pattern: "vehicles*.csv"
    id_column: vehicle_id
  parts:
    entity_type: Part
    file_pattern: "parts*.csv"
    id_column: part_number
  fitments:
    relationship_type: fits
    file_pattern: "fitments*.csv"
    from_column: part_number
    to_column: vehicle_id
