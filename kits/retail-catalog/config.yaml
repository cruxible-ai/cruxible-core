version: "1.0"
name: retail_catalog
kind: world_model
description: >
  Retail catalog world model for product relationship intelligence and
  merchandising decision support. The canonical layer tracks products, SKUs,
  brands, categories, channels, inventory, prices, promotions, customer
  segments, and shopping missions. Governed relationships capture the
  commercial judgments a merchant or agent should review before downstream
  recommendation, substitution, promotion, or pricing workflows rely on them:
  complements, substitutes, cannibalization, segment fit, and promotion lift.

# Entity types

entity_types:
  Product:
    description: Sellable product family or catalog item used for merchandising, search, substitution, and promotion decisions.
    properties:
      product_id:
        type: string
        primary_key: true
      title:
        type: string
        indexed: true
      description:
        type: string
        optional: true
      status:
        type: string
        optional: true
        enum: [active, seasonal, discontinued, draft]
      product_type:
        type: string
        optional: true
        indexed: true
      brand_name:
        type: string
        optional: true
        indexed: true

  SKU:
    description: Concrete sellable variant of a product, such as a size, color, pack size, or channel-specific SKU.
    properties:
      sku_id:
        type: string
        primary_key: true
      sku:
        type: string
        indexed: true
      title:
        type: string
        indexed: true
      color:
        type: string
        optional: true
      size:
        type: string
        optional: true
      pack_size:
        type: string
        optional: true
      status:
        type: string
        optional: true
        enum: [active, inactive, discontinued]

  Brand:
    description: Product brand or manufacturer used for assortment and substitute reasoning.
    properties:
      brand_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      brand_tier:
        type: string
        optional: true
        enum: [national, private_label, premium, value, marketplace]

  Category:
    description: Category, department, aisle, or taxonomy node for product organization.
    properties:
      category_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      department:
        type: string
        optional: true
        indexed: true

  Channel:
    description: Sales channel or surface where products are offered.
    properties:
      channel_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      channel_type:
        type: string
        optional: true
        enum: [ecommerce, store, marketplace, wholesale, app]

  CustomerSegment:
    description: Customer segment, audience, or merchandising cohort used for targeting decisions.
    properties:
      segment_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      description:
        type: string
        optional: true

  ShoppingMission:
    description: Customer mission or occasion, such as lunchbox restock, home office setup, or back-to-school bundle.
    properties:
      mission_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      description:
        type: string
        optional: true

  PricePoint:
    description: Observed or planned SKU price point for a channel and time window.
    properties:
      price_point_id:
        type: string
        primary_key: true
      currency:
        type: string
        optional: true
      list_price:
        type: number
      sale_price:
        type: number
        optional: true
      price_band:
        type: string
        optional: true
        enum: [value, mid, premium, luxury]
      effective_at:
        type: date
        optional: true

  InventoryPosition:
    description: Inventory or availability snapshot for a SKU in a location or channel.
    properties:
      inventory_position_id:
        type: string
        primary_key: true
      location_id:
        type: string
        optional: true
        indexed: true
      channel_hint:
        type: string
        optional: true
      on_hand:
        type: integer
        optional: true
      available_to_promise:
        type: integer
        optional: true
      as_of:
        type: date
        optional: true

  Promotion:
    description: Planned or historical promotional event that may lift demand, change substitution behavior, or cause cannibalization.
    properties:
      promotion_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      promotion_type:
        type: string
        optional: true
        enum: [discount, bundle, placement, email, coupon, loyalty, clearance]
      starts_at:
        type: date
        optional: true
      ends_at:
        type: date
        optional: true
      status:
        type: string
        optional: true
        enum: [planned, active, completed, cancelled]

# Relationships

relationships:
  # Canonical catalog, price, inventory, and promotion state.
  - name: sku_of_product
    description: SKU is a concrete variant of a product.
    from: SKU
    to: Product

  - name: product_from_brand
    description: Product belongs to a brand.
    from: Product
    to: Brand

  - name: product_in_category
    description: Product belongs to a retail category.
    from: Product
    to: Category

  - name: category_parent_category
    description: Category rolls up into a parent category.
    from: Category
    to: Category

  - name: product_available_in_channel
    description: Product is offered in a sales channel.
    from: Product
    to: Channel

  - name: sku_has_price
    description: SKU has a price point.
    from: SKU
    to: PricePoint

  - name: price_point_in_channel
    description: Price point applies to a sales channel.
    from: PricePoint
    to: Channel

  - name: sku_has_inventory
    description: SKU has an inventory or availability snapshot.
    from: SKU
    to: InventoryPosition

  - name: inventory_position_in_channel
    description: Inventory position applies to a sales channel or fulfillment surface.
    from: InventoryPosition
    to: Channel

  - name: promotion_features_product
    description: Promotion explicitly features a product.
    from: Promotion
    to: Product
    properties:
      placement:
        type: string
        optional: true
        enum: [hero, secondary, bundle, search_boost, email, in_store]

  - name: promotion_targets_segment
    description: Promotion is planned for a customer segment.
    from: Promotion
    to: CustomerSegment

  - name: mission_includes_category
    description: Shopping mission includes a category.
    from: ShoppingMission
    to: Category

  # Governed merchandising judgments.
  - name: product_complements_product
    description: Governed judgment that one product is a useful companion or bundle candidate for another product.
    from: Product
    to: Product
    properties:
      complement_type:
        type: string
        optional: true
        enum: [accessory, consumable, bundle, occasion, replenishment, styling]
      strength:
        type: number
        optional: true
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        basket_affinity:
          role: required
          always_review_on_unsure: true
        catalog_complement_classifier:
          role: advisory
          always_review_on_unsure: true
        merchant_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: product_substitutes_product
    description: Governed judgment that one product can satisfy the same customer need as another product.
    from: Product
    to: Product
    properties:
      substitute_type:
        type: string
        optional: true
        enum: [functional, size_variant, brand_alternative, private_label, price_alternative, contextual]
      replacement_quality:
        type: string
        optional: true
        enum: [close, partial, contextual]
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        catalog_attribute_similarity:
          role: required
          always_review_on_unsure: true
        category_price_overlap:
          role: required
          always_review_on_unsure: true
        search_substitution_behavior:
          role: advisory
          always_review_on_unsure: true
        merchant_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: product_cannibalizes_product
    description: Governed judgment that promoting, placing, discounting, or recommending one product is likely to reduce demand or margin for another product.
    from: Product
    to: Product
    properties:
      cannibalization_type:
        type: string
        optional: true
        enum: [promotion, price_change, placement, assortment, recommendation]
      evidence_window:
        type: string
        optional: true
      estimated_unit_transfer:
        type: number
        optional: true
      estimated_margin_impact:
        type: number
        optional: true
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        demand_displacement_model:
          role: required
          always_review_on_unsure: true
        catalog_attribute_similarity:
          role: advisory
          always_review_on_unsure: true
        category_price_overlap:
          role: advisory
          always_review_on_unsure: true
        merchant_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: product_targets_segment
    description: Governed judgment that a product is a good fit for a customer segment.
    from: Product
    to: CustomerSegment
    properties:
      fit_basis:
        type: string
        optional: true
        enum: [demographic, behavioral, mission, loyalty, price_sensitivity]
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        segment_fit_model:
          role: required
          always_review_on_unsure: true
        merchant_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: promotion_lifts_product
    description: Governed judgment that a promotion materially increases product demand, conversion, or contribution.
    from: Promotion
    to: Product
    properties:
      lift_type:
        type: string
        optional: true
        enum: [unit_lift, revenue_lift, margin_lift, conversion_lift, traffic_lift]
      expected_lift_percent:
        type: number
        optional: true
      observed_lift_percent:
        type: number
        optional: true
      evidence_window:
        type: string
        optional: true
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        promo_performance_model:
          role: required
          always_review_on_unsure: true
        inventory_capacity_check:
          role: advisory
          always_review_on_unsure: true
        merchant_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

# Named queries

named_queries:
  product_bundle_candidates:
    description: Starting from a product, find reviewed complementary products for bundles, PDP modules, or cross-sell surfaces.
    entry_point: Product
    returns: Product
    traversal:
      - relationship: product_complements_product
        direction: outgoing

  products_that_complement_product:
    description: Starting from a product, find reviewed products that complement it.
    entry_point: Product
    returns: Product
    traversal:
      - relationship: product_complements_product
        direction: incoming

  complements_for_shopping_mission:
    description: Starting from a shopping mission, find products connected through mission categories and reviewed complement edges.
    entry_point: ShoppingMission
    returns: Product
    traversal:
      - relationship: mission_includes_category
        direction: outgoing
      - relationship: product_in_category
        direction: incoming
      - relationship: product_complements_product
        direction: outgoing

  substitutes_for_product:
    description: Starting from a product, find reviewed substitute products.
    entry_point: Product
    returns: Product
    traversal:
      - relationship: product_substitutes_product
        direction: outgoing

  products_that_substitute_for_product:
    description: Starting from a product, find products reviewed as replacements for it.
    entry_point: Product
    returns: Product
    traversal:
      - relationship: product_substitutes_product
        direction: incoming

  substitution_options_for_inventory_gap:
    description: Starting from an inventory position, find substitute products for the product represented by the constrained SKU.
    entry_point: InventoryPosition
    returns: Product
    traversal:
      - relationship: sku_has_inventory
        direction: incoming
      - relationship: sku_of_product
        direction: outgoing
      - relationship: product_substitutes_product
        direction: outgoing

  category_substitute_map:
    description: Starting from a category, find products in the category and their reviewed substitutes.
    entry_point: Category
    returns: Product
    traversal:
      - relationship: product_in_category
        direction: incoming
      - relationship: product_substitutes_product
        direction: outgoing

  cannibalization_risk_for_product:
    description: Starting from a product, find products it is judged likely to cannibalize.
    entry_point: Product
    returns: Product
    traversal:
      - relationship: product_cannibalizes_product
        direction: outgoing

  products_that_cannibalize_product:
    description: Starting from a product, find products judged likely to cannibalize it.
    entry_point: Product
    returns: Product
    traversal:
      - relationship: product_cannibalizes_product
        direction: incoming

  product_price_points:
    description: Starting from a product, find its SKU price points.
    entry_point: Product
    returns: PricePoint
    traversal:
      - relationship: sku_of_product
        direction: incoming
      - relationship: sku_has_price
        direction: outgoing

  product_inventory_positions:
    description: Starting from a product, find its SKU inventory positions.
    entry_point: Product
    returns: InventoryPosition
    traversal:
      - relationship: sku_of_product
        direction: incoming
      - relationship: sku_has_inventory
        direction: outgoing

  promotion_cannibalization_risk:
    description: Starting from a promotion, find products likely to lose demand because the promotion features cannibalizing products.
    entry_point: Promotion
    returns: Product
    traversal:
      - relationship: promotion_features_product
        direction: outgoing
      - relationship: product_cannibalizes_product
        direction: outgoing

  promotion_lift_watch:
    description: Starting from a promotion, find products judged to receive material lift from the promotion.
    entry_point: Promotion
    returns: Product
    traversal:
      - relationship: promotion_lifts_product
        direction: outgoing

  segment_merchandising_candidates:
    description: Starting from a customer segment, find products reviewed as good merchandising fits for that segment.
    entry_point: CustomerSegment
    returns: Product
    traversal:
      - relationship: product_targets_segment
        direction: incoming

  segment_promotion_products:
    description: Starting from a customer segment, find products featured in promotions targeting that segment.
    entry_point: CustomerSegment
    returns: Product
    traversal:
      - relationship: promotion_targets_segment
        direction: incoming
      - relationship: promotion_features_product
        direction: outgoing

  brand_substitute_risk:
    description: Starting from a brand, find substitute products that may compete with that brand's products.
    entry_point: Brand
    returns: Product
    traversal:
      - relationship: product_from_brand
        direction: incoming
      - relationship: product_substitutes_product
        direction: outgoing

  channel_catalog_products:
    description: Starting from a channel, find products available in that channel.
    entry_point: Channel
    returns: Product
    traversal:
      - relationship: product_available_in_channel
        direction: incoming

  channel_price_points:
    description: Starting from a channel, find price points that apply to it.
    entry_point: Channel
    returns: PricePoint
    traversal:
      - relationship: price_point_in_channel
        direction: incoming

  channel_inventory_positions:
    description: Starting from a channel, find inventory positions that apply to it.
    entry_point: Channel
    returns: InventoryPosition
    traversal:
      - relationship: inventory_position_in_channel
        direction: incoming

# Quality checks

quality_checks:
  - name: products_have_category
    kind: cardinality
    description: Every product should belong to at least one category.
    entity_type: Product
    relationship_type: product_in_category
    direction: outgoing
    min_count: 1
    severity: warning

  - name: skus_have_product
    kind: cardinality
    description: Every SKU should belong to exactly one product.
    entity_type: SKU
    relationship_type: sku_of_product
    direction: outgoing
    min_count: 1
    max_count: 1
    severity: error

  - name: inventory_positions_have_sku
    kind: cardinality
    description: Every inventory position should be attached to at least one SKU.
    entity_type: InventoryPosition
    relationship_type: sku_has_inventory
    direction: incoming
    min_count: 1
    severity: warning

  - name: active_skus_have_price
    kind: cardinality
    description: Every SKU should have at least one price point.
    entity_type: SKU
    relationship_type: sku_has_price
    direction: outgoing
    min_count: 1
    severity: warning

  - name: price_points_have_channel
    kind: cardinality
    description: Every price point should identify the channel it applies to.
    entity_type: PricePoint
    relationship_type: price_point_in_channel
    direction: outgoing
    min_count: 1
    severity: warning

  - name: inventory_positions_have_channel
    kind: cardinality
    description: Every inventory position should identify the channel or fulfillment surface it applies to.
    entity_type: InventoryPosition
    relationship_type: inventory_position_in_channel
    direction: outgoing
    min_count: 1
    severity: warning

  - name: complements_have_type
    kind: property
    description: Every complement edge should specify the commercial complement type.
    target: relationship
    relationship_type: product_complements_product
    property: complement_type
    rule: required
    severity: warning

  - name: substitutes_have_type
    kind: property
    description: Every substitute edge should specify what kind of replacement it represents.
    target: relationship
    relationship_type: product_substitutes_product
    property: substitute_type
    rule: required
    severity: error

  - name: cannibalization_has_type
    kind: property
    description: Every cannibalization edge should specify the commercial mechanism.
    target: relationship
    relationship_type: product_cannibalizes_product
    property: cannibalization_type
    rule: required
    severity: error

  - name: promotion_lift_has_type
    kind: property
    description: Every promotion lift edge should specify the lift type.
    target: relationship
    relationship_type: promotion_lifts_product
    property: lift_type
    rule: required
    severity: error

  - name: segment_targets_have_basis
    kind: property
    description: Every segment targeting edge should specify the basis for segment fit.
    target: relationship
    relationship_type: product_targets_segment
    property: fit_basis
    rule: required
    severity: warning

# Integrations

integrations:
  basket_affinity:
    kind: retail_basket_affinity
    contract: null
    notes: Uses basket co-occurrence, attach rate, or bundle behavior to support complement judgments.

  catalog_complement_classifier:
    kind: retail_catalog_semantic_match
    contract: null
    notes: Uses product attributes, taxonomy, and shopping mission context to classify complements.

  catalog_attribute_similarity:
    kind: retail_catalog_similarity
    contract: null
    notes: Uses structured attributes and semantic product data to support substitute judgments.

  category_price_overlap:
    kind: retail_price_band_overlap
    contract: null
    notes: Checks category, size, pack, and price-band compatibility for substitution or cannibalization.

  search_substitution_behavior:
    kind: retail_search_session_switching
    contract: null
    notes: Uses search, PDP, or session switching behavior as advisory substitution evidence.

  demand_displacement_model:
    kind: retail_demand_displacement
    contract: null
    notes: Uses sales, promotion, placement, or recommendation outcomes to support cannibalization judgments.

  segment_fit_model:
    kind: retail_segment_fit
    contract: null
    notes: Uses segment behavior and merchandising rules to judge product fit for a segment.

  promo_performance_model:
    kind: retail_promotion_performance
    contract: null
    notes: Uses promotion results or forecasts to judge product lift.

  inventory_capacity_check:
    kind: retail_inventory_capacity
    contract: null
    notes: Checks whether inventory availability can support promotion or substitution recommendations.

  merchant_review:
    kind: human_review
    contract: null
    notes: Merchant, category manager, or planner review signal used for accepted commercial judgment.

# Feedback and outcomes

feedback_profiles:
  product_complements_product:
    version: 1
    reason_codes:
      not_bought_together:
        description: Basket evidence does not support this complement relationship.
        remediation_hint: provider_fix
        required_scope_keys: [complement_type]
      seasonal_or_mission_only:
        description: Complement relationship only applies in a narrower season or shopping mission.
        remediation_hint: decision_policy
        required_scope_keys: [complement_type]
      poor_bundle_economics:
        description: Products are related but do not make a useful bundle or cross-sell action.
        remediation_hint: decision_policy
        required_scope_keys: [complement_type]
    scope_keys:
      source_product: FROM.product_id
      target_product: TO.product_id
      complement_type: EDGE.complement_type

  product_substitutes_product:
    version: 1
    reason_codes:
      not_functionally_equivalent:
        description: Products do not satisfy the same customer need.
        remediation_hint: provider_fix
        required_scope_keys: [substitute_type]
      price_band_mismatch:
        description: Products are too far apart in price or value tier to substitute cleanly.
        remediation_hint: constraint
        required_scope_keys: [substitute_type]
      size_or_pack_mismatch:
        description: Size, quantity, pack, or unit basis makes the replacement misleading.
        remediation_hint: quality_check
        required_scope_keys: [substitute_type]
      brand_tier_mismatch:
        description: Brand tier difference changes customer expectations enough to require narrower substitution.
        remediation_hint: decision_policy
        required_scope_keys: [substitute_type]
    scope_keys:
      source_product: FROM.product_id
      target_product: TO.product_id
      substitute_type: EDGE.substitute_type

  product_cannibalizes_product:
    version: 1
    reason_codes:
      no_observed_displacement:
        description: Commercial evidence does not show demand displacement.
        remediation_hint: provider_fix
        required_scope_keys: [cannibalization_type]
      stockout_confounder:
        description: Apparent demand transfer was caused by stockout or availability effects.
        remediation_hint: constraint
        required_scope_keys: [cannibalization_type]
      promotion_confounder:
        description: Apparent cannibalization was caused by another concurrent promotion or placement.
        remediation_hint: decision_policy
        required_scope_keys: [cannibalization_type]
      wrong_direction:
        description: The demand displacement direction is reversed or reciprocal.
        remediation_hint: provider_fix
        required_scope_keys: [cannibalization_type]
    scope_keys:
      source_product: FROM.product_id
      target_product: TO.product_id
      cannibalization_type: EDGE.cannibalization_type

  product_targets_segment:
    version: 1
    reason_codes:
      wrong_segment:
        description: Product is not a good fit for this segment.
        remediation_hint: provider_fix
        required_scope_keys: [fit_basis]
      segment_too_broad:
        description: Segment is too broad for this targeting judgment.
        remediation_hint: decision_policy
        required_scope_keys: [fit_basis]
      seasonal_context_missing:
        description: Segment fit depends on a seasonal or mission context not represented in the edge.
        remediation_hint: constraint
        required_scope_keys: [fit_basis]
    scope_keys:
      product: FROM.product_id
      segment: TO.segment_id
      fit_basis: EDGE.fit_basis

  promotion_lifts_product:
    version: 1
    reason_codes:
      no_observed_lift:
        description: Promotion did not materially lift the product.
        remediation_hint: provider_fix
        required_scope_keys: [lift_type]
      inventory_constrained:
        description: Promotion lift was capped or distorted by inventory availability.
        remediation_hint: quality_check
        required_scope_keys: [lift_type]
      margin_negative:
        description: Promotion lifted units or revenue but harmed contribution margin.
        remediation_hint: decision_policy
        required_scope_keys: [lift_type]
    scope_keys:
      promotion: FROM.promotion_id
      product: TO.product_id
      lift_type: EDGE.lift_type

outcome_profiles:
  complement_resolution:
    anchor_type: resolution
    relationship_type: product_complements_product
    version: 1
    outcome_codes:
      bundle_performed:
        description: Later bundle, recommendation, or PDP placement performance confirmed the complement relationship.
        remediation_hint: unknown
        required_scope_keys: [relationship_type]
      weak_attach_rate:
        description: Later behavior showed weak attach rate or poor cross-sell performance.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      missed_complement:
        description: A useful complement was missing from the reviewed graph.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  substitute_resolution:
    anchor_type: resolution
    relationship_type: product_substitutes_product
    version: 1
    outcome_codes:
      substitution_succeeded:
        description: Later out-of-stock, search, or recommendation behavior confirmed the substitute relationship.
        remediation_hint: unknown
        required_scope_keys: [relationship_type]
      bad_replacement:
        description: Later behavior or merchant review showed the substitute was misleading.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      missed_substitute:
        description: A useful substitute was missing from the reviewed graph.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  cannibalization_resolution:
    anchor_type: resolution
    relationship_type: product_cannibalizes_product
    version: 1
    outcome_codes:
      displacement_confirmed:
        description: Later sales or margin outcomes confirmed demand displacement.
        remediation_hint: unknown
        required_scope_keys: [relationship_type]
      false_cannibalization:
        description: Later outcomes showed the products did not materially cannibalize each other.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      missed_cannibalization:
        description: A material cannibalization path was missed by the workflow or graph.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  segment_fit_resolution:
    anchor_type: resolution
    relationship_type: product_targets_segment
    version: 1
