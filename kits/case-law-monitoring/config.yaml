version: "1.0"
name: case_law_monitoring
kind: world_model
description: >
  Single-layer case-law monitoring world model for use alongside a specialized
  legal agent. The canonical layer tracks opinions, courts, judges, statutes,
  legal issues, clients, firm matters, filings, deadlines, attorneys, arguments,
  and case outcomes. Governed relationships capture the legal judgments a lawyer
  or agent should review: matter statutory scope, holdings, statutory
  interpretation, treatment of prior opinions, argument impact, matter impact,
  filing response obligations, and review obligations.

# ─── Entity types ────────────────────────────────────────────────────

entity_types:
  Opinion:
    description: Published opinion, order, or precedential legal authority monitored by the legal agent.
    properties:
      opinion_id:
        type: string
        primary_key: true
      case_name:
        type: string
        indexed: true
      citation:
        type: string
        optional: true
        indexed: true
      docket_number:
        type: string
        optional: true
      date_filed:
        type: date
        optional: true
      jurisdiction:
        type: string
        optional: true
        indexed: true
      precedential_status:
        type: string
        optional: true
        enum: [published, unpublished, precedential, nonprecedential, order]
      source_url:
        type: string
        optional: true

  Court:
    description: Court or tribunal issuing opinions and hosting matters.
    properties:
      court_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      jurisdiction:
        type: string
        indexed: true
      level:
        type: string
        optional: true
        enum: [trial, appellate, supreme, administrative]

  Judge:
    description: Judge, panel member, or adjudicator associated with an opinion.
    properties:
      judge_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      court_hint:
        type: string
        optional: true

  Statute:
    description: Statute, regulation, rule, or doctrinal source interpreted by opinions and relevant to matters.
    properties:
      statute_id:
        type: string
        primary_key: true
      title:
        type: string
        indexed: true
      section:
        type: string
        indexed: true
      jurisdiction:
        type: string
        optional: true
      topic:
        type: string
        optional: true

  LegalIssue:
    description: Practice-specific legal issue or doctrine tracked by a firm or team.
    properties:
      issue_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      practice_area:
        type: string
        optional: true
      description:
        type: string
        optional: true

  Client:
    description: Firm client associated with one or more matters.
    properties:
      client_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      industry:
        type: string
        optional: true

  Matter:
    description: Firm matter, pending case, investigation, deal, or client representation that legal developments may affect.
    properties:
      matter_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      client_name:
        type: string
        optional: true
        indexed: true
        description: Denormalized display name; matter_for_client is the relationship source of truth.
      matter_type:
        type: string
        optional: true
        enum: [litigation, investigation, advisory, transaction, regulatory]
      status:
        type: string
        optional: true
        enum: [active, stayed, closed, monitoring]
      jurisdiction:
        type: string
        optional: true

  Filing:
    description: Filing, brief, motion, order, docket entry, or client work product associated with a matter.
    properties:
      filing_id:
        type: string
        primary_key: true
      docket_number:
        type: string
        optional: true
      title:
        type: string
        indexed: true
      filing_type:
        type: string
        optional: true
        enum: [complaint, motion, brief, order, notice, letter, memo]
      filed_at:
        type: date
        optional: true

  Deadline:
    description: Filing deadline, response obligation, hearing date, or other matter deadline.
    properties:
      deadline_id:
        type: string
        primary_key: true
      title:
        type: string
        indexed: true
      due_date:
        type: date
      deadline_type:
        type: string
        optional: true
        enum: [filing, response, discovery, hearing, statute_of_limitations, client_update]
      status:
        type: string
        optional: true
        enum: [pending, met, missed, extended, waived, closed]

  Attorney:
    description: Attorney or legal team member responsible for matters and review items.
    properties:
      attorney_id:
        type: string
        primary_key: true
      name:
        type: string
        indexed: true
      team:
        type: string
        optional: true
      email:
        type: string
        optional: true

  Argument:
    description: Legal argument, position, theory, or cited-authority bundle used in a matter.
    properties:
      argument_id:
        type: string
        primary_key: true
      title:
        type: string
        indexed: true
      description:
        type: string
        optional: true
      argument_type:
        type: string
        optional: true
        enum: [claim, defense, counterclaim, affirmative_defense, motion, advisory_position]
      position:
        type: string
        optional: true
        enum: [plaintiff, defense, petitioner, respondent, advisory, neutral]
      status:
        type: string
        optional: true
        enum: [draft, filed, planned, abandoned, preserved]

  Holding:
    description: Atomic holding or rule extracted from an opinion for reviewed legal reasoning.
    properties:
      holding_id:
        type: string
        primary_key: true
      summary:
        type: string
        indexed: true
      holding_type:
        type: string
        optional: true
        enum: [rule, exception, application, distinction, procedural]
      scope:
        type: string
        optional: true

  ReviewItem:
    description: Review obligation or attorney work item created by legal developments.
    properties:
      review_item_id:
        type: string
        primary_key: true
      title:
        type: string
        indexed: true
      priority:
        type: string
        optional: true
        enum: [critical, high, medium, low]
      status:
        type: string
        optional: true
        enum: [open, assigned, reviewed, closed]
      due_at:
        type: date
        optional: true

  CaseOutcome:
    description: Resolved matter result. Distinct from Cruxible Loop 2 outcomes, which judge whether system decisions were correct.
    properties:
      outcome_id:
        type: string
        primary_key: true
      result:
        type: string
        enum: [won, lost, settled, dismissed, default_judgment, withdrawn, moot]
      resolved_at:
        type: date
        optional: true
      notes:
        type: string
        optional: true

# ─── Relationships ──────────────────────────────────────────────────

relationships:
  # Canonical anchors and firm state.
  - name: opinion_from_court
    description: Opinion was issued by a court.
    from: Opinion
    to: Court

  - name: opinion_decided_by_judge
    description: Opinion was decided or joined by a judge.
    from: Opinion
    to: Judge
    properties:
      role:
        type: string
        optional: true
        enum: [author, panel_member, concurrence, dissent]

  - name: opinion_cites_opinion
    description: Opinion cites another opinion as authority.
    from: Opinion
    to: Opinion
    properties:
      citation_context:
        type: string
        optional: true

  - name: filing_in_matter
    description: Filing belongs to a firm matter.
    from: Filing
    to: Matter

  - name: matter_for_client
    description: Matter belongs to a firm client.
    from: Matter
    to: Client

  - name: matter_assigned_to_attorney
    description: Matter is assigned to an attorney or responsible team member.
    from: Matter
    to: Attorney
    properties:
      role:
        type: string
        optional: true
        enum: [lead, reviewer, responsible_attorney, watcher]

  - name: matter_in_jurisdiction
    description: Matter is pending in or primarily governed by a court jurisdiction.
    from: Matter
    to: Court

  - name: matter_has_deadline
    description: Matter has a filing deadline, response obligation, or other tracked deadline.
    from: Matter
    to: Deadline

  - name: argument_in_matter
    description: Legal argument belongs to a matter.
    from: Argument
    to: Matter

  - name: argument_raises_issue
    description: Legal argument raises a tracked legal issue.
    from: Argument
    to: LegalIssue

  - name: argument_cites_opinion
    description: Legal argument relies on a cited opinion.
    from: Argument
    to: Opinion
    properties:
      citation_role:
        type: string
        optional: true
        enum: [primary, supporting, distinguishing, background]

  - name: statute_governs_issue
    description: Statute, rule, or regulation is relevant to a tracked legal issue.
    from: Statute
    to: LegalIssue

  - name: outcome_of_matter
    description: Case outcome resolves or records the result of a matter.
    from: CaseOutcome
    to: Matter

  - name: outcome_resolved_argument
    description: Case outcome resolved or affected a specific argument.
    from: CaseOutcome
    to: Argument
    properties:
      role:
        type: string
        optional: true
        enum: [primary_argument, alternative_argument, defensive, amicus, not_reached]
      prevailed:
        type: bool
        optional: true
      weight:
        type: string
        optional: true
        enum: [adopted, distinguished, rejected, not_reached]
      notes:
        type: string
        optional: true

  # Governed legal judgments.
  - name: matter_turns_on_statute
    description: Governed judgment that a matter's legal scope depends on a statute, rule, or doctrine.
    from: Matter
    to: Statute
    properties:
      scope_basis:
        type: string
        optional: true
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        matter_statute_match:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: opinion_has_holding
    description: Governed judgment that an opinion contains a specific holding.
    from: Opinion
    to: Holding
    properties:
      locator:
        type: string
        optional: true
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        holding_extractor:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: holding_interprets_statute
    description: Governed judgment that a holding interprets a statute, rule, or regulation.
    from: Holding
    to: Statute
    properties:
      interpretation_type:
        type: string
        enum: [broadens, narrows, clarifies, creates_exception, applies, distinguishes]
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        statute_interpretation_extractor:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: holding_addresses_issue
    description: Governed judgment that a holding materially addresses a tracked legal issue.
    from: Holding
    to: LegalIssue
    properties:
      issue_fit:
        type: string
        optional: true
        enum: [direct, analogous, adjacent, weak]
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        issue_mapper:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: opinion_treats_opinion
    description: Governed judgment that an opinion treats a cited opinion in a legally meaningful way.
    from: Opinion
    to: Opinion
    properties:
      treatment:
        type: string
        enum: [follows, distinguishes, criticizes, limits, overrules, abrogates]
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        citation_treatment_classifier:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: holding_supports_argument
    description: Governed judgment that a holding supports a firm argument.
    from: Holding
    to: Argument
    properties:
      support_strength:
        type: string
        optional: true
        enum: [strong, moderate, weak, analogous]
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        argument_impact_assessor:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: holding_undermines_argument
    description: Governed judgment that a holding undermines, narrows, or creates risk for a firm argument.
    from: Holding
    to: Argument
    properties:
      risk_type:
        type: string
        optional: true
        enum: [adverse_authority, distinction_required, waiver_risk, strategy_shift]
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        argument_impact_assessor:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: opinion_affects_matter
    description: Governed judgment that a new opinion affects a firm matter.
    from: Opinion
    to: Matter
    properties:
      impact_level:
        type: string
        enum: [critical, high, medium, low, none]
      impact_type:
        type: string
        optional: true
        enum: [argument_update, adverse_authority, filing_deadline, settlement_posture, monitoring_only]
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        matter_impact_assessor:
          role: required
          always_review_on_unsure: true
        jurisdiction_overlap:
          role: advisory
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: opinion_creates_review_item
    description: Governed judgment that an opinion creates a concrete review obligation.
    from: Opinion
    to: ReviewItem
    properties:
      obligation_type:
        type: string
        optional: true
        enum: [brief_update, client_alert, strategy_review, citation_check, deadline_check]
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        review_item_router:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: review_item_for_matter
    description: Governed judgment linking a review item to the matter that needs attention.
    from: ReviewItem
    to: Matter
    properties:
      assignment_basis:
        type: string
        optional: true
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        review_item_router:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

  - name: filing_requires_response
    description: Governed judgment that a filing creates a response obligation or deadline for a tracked matter.
    from: Filing
    to: Matter
    properties:
      response_type:
        type: string
        optional: true
        enum: [answer, opposition, reply, motion_to_dismiss, no_action, client_update]
      deadline_date:
        type: date
        optional: true
      rationale:
        type: string
        optional: true
    matching:
      integrations:
        filing_obligation_assessor:
          role: required
          always_review_on_unsure: true
        docket_matter_match:
          role: required
          always_review_on_unsure: true
        attorney_review:
          role: advisory
          always_review_on_unsure: true
      auto_resolve_when: all_support

# ─── Decision policies ───────────────────────────────────────────────

decision_policies:
  - name: matter_scope_requires_review
    description: Matter statutory-scope judgments should be reviewed before downstream impact workflows rely on them.
    rationale: Incorrect matter-scope links can make later opinion-impact assessments miss relevant authority or overstate irrelevant authority.
    applies_to: workflow
    workflow_name: propose_matter_statutory_scope
    relationship_type: matter_turns_on_statute
    effect: require_review

  - name: matter_impacts_require_review
    description: Matter impact judgments should be reviewed before being treated as trusted work-product state.
    rationale: A false matter-impact edge can create unnecessary client work or miss a required legal update.
    applies_to: workflow
    workflow_name: propose_matter_impact
    relationship_type: opinion_affects_matter
    effect: require_review

  - name: negative_treatment_requires_review
    description: Treatment of cited authority requires attorney review before it affects matter strategy.
    rationale: Negative treatment is high leverage and can change active filings or client advice.
    applies_to: workflow
    workflow_name: propose_opinion_treatment
    relationship_type: opinion_treats_opinion
    effect: require_review

  - name: filing_obligations_require_review
    description: Filing response obligations require review before being treated as trusted deadline state.
    rationale: Incorrect filing obligations can create missed deadlines or unnecessary work.
    applies_to: workflow
    workflow_name: propose_filing_response
    relationship_type: filing_requires_response
    effect: require_review

# ─── Named queries ───────────────────────────────────────────────────

named_queries:
  matters_impacted_by_opinion:
    description: Starting from an opinion, find matters judged affected by that opinion.
    entry_point: Opinion
    returns: Matter
    traversal:
      - relationship: opinion_affects_matter
        direction: outgoing

  client_impact_watch:
    description: Starting from a client, find opinions judged to affect that client's matters.
    entry_point: Client
    returns: Opinion
    traversal:
      - relationship: matter_for_client
        direction: incoming
      - relationship: opinion_affects_matter
        direction: incoming

  matter_statutory_scope:
    description: Starting from a matter, find statutes and doctrines accepted as within the matter's legal scope.
    entry_point: Matter
    returns: Statute
    traversal:
      - relationship: matter_turns_on_statute
        direction: outgoing

  adverse_authority_for_matter:
    description: Starting from a matter, find opinions whose holdings undermine arguments in that matter.
    entry_point: Matter
    returns: Opinion
    traversal:
      - relationship: argument_in_matter
        direction: incoming
      - relationship: holding_undermines_argument
        direction: incoming
      - relationship: opinion_has_holding
        direction: incoming

  supporting_authority_for_matter:
    description: Starting from a matter, find opinions whose holdings support arguments in that matter.
    entry_point: Matter
    returns: Opinion
    traversal:
      - relationship: argument_in_matter
        direction: incoming
      - relationship: holding_supports_argument
        direction: incoming
      - relationship: opinion_has_holding
        direction: incoming

  negative_treatment_for_cited_authorities:
    description: Starting from a matter, find new opinions that negatively treat authorities cited by matter arguments.
    entry_point: Matter
    returns: Opinion
    traversal:
      - relationship: argument_in_matter
        direction: incoming
      - relationship: argument_cites_opinion
        direction: outgoing
      - relationship: opinion_treats_opinion
        direction: incoming

  precedent_chain_for_issue:
    description: Starting from a legal issue, find opinions with reviewed holdings that address the issue.
    entry_point: LegalIssue
    returns: Opinion
    traversal:
      - relationship: holding_addresses_issue
        direction: incoming
      - relationship: opinion_has_holding
        direction: incoming

  statutory_interpretations_for_issue:
    description: Starting from a legal issue, find statutes interpreted by holdings addressing that issue.
    entry_point: LegalIssue
    returns: Statute
    traversal:
      - relationship: holding_addresses_issue
        direction: incoming
      - relationship: holding_interprets_statute
        direction: outgoing

  review_items_for_matter:
    description: Starting from a matter, find open or historical review items created by monitored opinions.
    entry_point: Matter
    returns: ReviewItem
    traversal:
      - relationship: review_item_for_matter
        direction: incoming

  filing_response_obligations_for_matter:
    description: Starting from a matter, find filings judged to require a response or deadline.
    entry_point: Matter
    returns: Filing
    traversal:
      - relationship: filing_requires_response
        direction: incoming

  deadline_watch:
    description: Starting from an attorney, find deadlines across assigned matters.
    entry_point: Attorney
    returns: Deadline
    traversal:
      - relationship: matter_assigned_to_attorney
        direction: incoming
      - relationship: matter_has_deadline
        direction: outgoing

  argument_track_record:
    description: Starting from an argument, find case outcomes where that argument was resolved or evaluated.
    entry_point: Argument
    returns: CaseOutcome
    traversal:
      - relationship: outcome_resolved_argument
        direction: incoming

  case_outcomes_for_matter:
    description: Starting from a matter, find case outcomes recorded for that matter.
    entry_point: Matter
    returns: CaseOutcome
    traversal:
      - relationship: outcome_of_matter
        direction: incoming

  opinion_review_items:
    description: Starting from an opinion, find review items created by that opinion.
    entry_point: Opinion
    returns: ReviewItem
    traversal:
      - relationship: opinion_creates_review_item
        direction: outgoing

# ─── Quality checks ──────────────────────────────────────────────────

quality_checks:
  - name: opinions_have_court
    kind: cardinality
    description: Every opinion should be linked to an issuing court.
    entity_type: Opinion
    relationship_type: opinion_from_court
    direction: outgoing
    min_count: 1
    severity: warning

  - name: matters_have_responsible_attorney
    kind: cardinality
    description: Every active matter should have at least one responsible attorney.
    entity_type: Matter
    relationship_type: matter_assigned_to_attorney
    direction: outgoing
    min_count: 1
    severity: warning

  - name: matters_have_one_client
    kind: cardinality
    description: Every matter should be linked to exactly one firm client.
    entity_type: Matter
    relationship_type: matter_for_client
    direction: outgoing
    min_count: 1
    max_count: 1
    severity: warning

  - name: deadlines_have_matter
    kind: cardinality
    description: Every deadline should be attached to at least one matter.
    entity_type: Deadline
    relationship_type: matter_has_deadline
    direction: incoming
    min_count: 1
    severity: warning

  - name: case_outcomes_have_matter
    kind: cardinality
    description: Every case outcome should resolve exactly one matter.
    entity_type: CaseOutcome
    relationship_type: outcome_of_matter
    direction: outgoing
    min_count: 1
    max_count: 1
    severity: error

  - name: opinion_treatments_have_treatment
    kind: property
    description: Every opinion treatment edge should specify the treatment type.
    target: relationship
    relationship_type: opinion_treats_opinion
    property: treatment
    rule: required
    severity: error

  - name: matter_impacts_have_level
    kind: property
    description: Every matter impact edge should have an impact level.
    target: relationship
    relationship_type: opinion_affects_matter
    property: impact_level
    rule: required
    severity: error

  - name: filing_responses_have_response_type
    kind: property
    description: Every filing response edge should specify the response obligation type.
    target: relationship
    relationship_type: filing_requires_response
    property: response_type
    rule: required
    severity: error

# ─── Integrations ────────────────────────────────────────────────────

integrations:
  matter_statute_match:
    kind: legal_matter_scope_match
    contract: null
    notes: Links tracked matters to statutes, rules, or doctrines referenced in matter scope.

  holding_extractor:
    kind: legal_holding_extraction
    contract: null
    notes: Extracts candidate holdings and scope limitations from opinions.

  statute_interpretation_extractor:
    kind: legal_statute_interpretation
    contract: null
    notes: Maps holdings to statutes, rules, and interpretation types.

  issue_mapper:
    kind: legal_issue_mapping
    contract: null
    notes: Maps holdings to firm-tracked legal issues.

  citation_treatment_classifier:
    kind: legal_citation_treatment
    contract: null
    notes: Classifies how an opinion treats cited authority.

  argument_impact_assessor:
    kind: legal_argument_impact
    contract: null
    notes: Judges whether reviewed holdings support or undermine firm arguments.

  matter_impact_assessor:
    kind: legal_matter_impact
    contract: null
    notes: Judges whether a legal development affects a matter.

  jurisdiction_overlap:
    kind: legal_authority_weighting
    contract: null
    notes: Weighs binding, persuasive, or irrelevant authority based on matter jurisdiction.

  review_item_router:
    kind: legal_review_routing
    contract: null
    notes: Creates review obligations for attorneys from accepted impact signals.

  filing_obligation_assessor:
    kind: legal_filing_obligation
    contract: null
    notes: Determines whether a filing creates a response obligation or deadline.

  docket_matter_match:
    kind: legal_docket_matter_resolution
    contract: null
    notes: Matches a filing or docket event to the correct tracked matter.

  attorney_review:
    kind: human_review
    contract: null
    notes: Attorney review signal used for work-product acceptance and trust calibration.

# ─── Contracts and providers ─────────────────────────────────────────

contracts:
  EmptyInput:
    fields: {}

  OpinionAnalysisInput:
    fields:
      opinions:
        type: json

  OpinionAnalysisOutput:
    fields:
      items:
        type: json

  StatuteInterpretationInput:
    fields:
      opinions:
        type: json
      holdings:
        type: json
      statutes:
        type: json
      opinion_holding_edges:
        type: json

  StatuteInterpretationOutput:
    fields:
      items:
        type: json

  IssueMappingInput:
    fields:
      holdings:
        type: json
      issues:
        type: json
      statute_edges:
        type: json

  IssueMappingOutput:
    fields:
      items:
        type: json

  OpinionTreatmentInput:
    fields:
      opinions:
        type: json
      citation_edges:
        type: json

  OpinionTreatmentOutput:
