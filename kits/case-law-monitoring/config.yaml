        propose_relationship_group:
          relationship_type: review_item_for_matter
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: These review obligations should be attached to the proposed matters.
          thesis_facts:
            rule_id: review_item_matter_routing
            rule_version: 1
          proposed_by: agent
        as: proposal
    returns: proposal

# ─── Feedback and outcomes ───────────────────────────────────────────

feedback_profiles:
  matter_turns_on_statute:
    version: 1
    reason_codes:
      wrong_statute_link:
        description: The statute, rule, or doctrine is not relevant to this matter's legal issues.
        remediation_hint: provider_fix
        required_scope_keys: [scope_basis]
      issue_not_in_matter:
        description: The issue used to justify this statutory scope is not part of the matter.
        remediation_hint: quality_check
        required_scope_keys: [scope_basis]
      duplicate_scope:
        description: This scope link duplicates an already accepted matter-scope entry.
        remediation_hint: constraint
        required_scope_keys: [scope_basis]
    scope_keys:
      matter: FROM.matter_id
      statute: TO.statute_id
      scope_basis: EDGE.scope_basis

  opinion_has_holding:
    version: 1
    reason_codes:
      overbroad_holding:
        description: Holding is broader than the opinion supports.
        remediation_hint: provider_fix
        required_scope_keys: [holding_type]
      missed_scope_limitation:
        description: Holding omits an important limitation or procedural posture.
        remediation_hint: constraint
        required_scope_keys: [holding_type]
      duplicate_holding:
        description: Holding duplicates an existing accepted holding.
        remediation_hint: decision_policy
        required_scope_keys: [holding_type]
    scope_keys:
      opinion: FROM.opinion_id
      holding: TO.holding_id
      holding_type: TO.holding_type

  holding_interprets_statute:
    version: 1
    reason_codes:
      wrong_statute:
        description: Holding does not interpret this statute or rule.
        remediation_hint: provider_fix
        required_scope_keys: [interpretation_type]
      wrong_interpretation_type:
        description: Interpretation type is wrong.
        remediation_hint: provider_fix
        required_scope_keys: [interpretation_type]
      scope_mismatch:
        description: Interpretation applies only under a narrower procedural or factual scope.
        remediation_hint: constraint
        required_scope_keys: [interpretation_type]
    scope_keys:
      holding: FROM.holding_id
      statute: TO.statute_id
      interpretation_type: EDGE.interpretation_type

  holding_addresses_issue:
    version: 1
    reason_codes:
      issue_too_broad:
        description: Holding is related but does not directly address the tracked issue.
        remediation_hint: decision_policy
        required_scope_keys: [issue_fit]
      wrong_practice_area:
        description: Holding belongs to a different practice-area framing.
        remediation_hint: provider_fix
        required_scope_keys: [issue_fit]
    scope_keys:
      holding: FROM.holding_id
      issue: TO.issue_id
      issue_fit: EDGE.issue_fit

  opinion_treats_opinion:
    version: 1
    reason_codes:
      not_meaningful_treatment:
        description: Citation does not meaningfully treat the cited authority.
        remediation_hint: provider_fix
        required_scope_keys: [treatment]
      wrong_treatment_type:
        description: Treatment type is incorrect.
        remediation_hint: provider_fix
        required_scope_keys: [treatment]
      citation_context_mismatch:
        description: Treatment is accurate only in a different doctrinal or procedural context.
        remediation_hint: constraint
        required_scope_keys: [treatment]
    scope_keys:
      source_opinion: FROM.opinion_id
      cited_opinion: TO.opinion_id
      treatment: EDGE.treatment

  holding_supports_argument:
    version: 1
    reason_codes:
      tangential_support:
        description: Holding is related but does not materially support this argument.
        remediation_hint: decision_policy
        required_scope_keys: [support_strength]
      factually_distinguishable:
        description: Holding depends on facts too different from the matter argument.
        remediation_hint: constraint
        required_scope_keys: [support_strength]
    scope_keys:
      holding: FROM.holding_id
      argument: TO.argument_id
      support_strength: EDGE.support_strength

  holding_undermines_argument:
    version: 1
    reason_codes:
      no_material_risk:
        description: Holding does not materially undermine the argument.
        remediation_hint: decision_policy
        required_scope_keys: [risk_type]
      wrong_direction:
        description: Holding supports or is neutral to the argument rather than undermining it.
        remediation_hint: provider_fix
        required_scope_keys: [risk_type]
      distinguishable_authority:
        description: Holding is distinguishable and should not be treated as adverse.
        remediation_hint: constraint
        required_scope_keys: [risk_type]
    scope_keys:
      holding: FROM.holding_id
      argument: TO.argument_id
      risk_type: EDGE.risk_type

  opinion_affects_matter:
    version: 1
    reason_codes:
      no_material_impact:
        description: Opinion does not materially affect this matter.
        remediation_hint: decision_policy
        required_scope_keys: [impact_level, impact_type]
      wrong_impact_level:
        description: Impact level is overstated or understated.
        remediation_hint: decision_policy
        required_scope_keys: [impact_level, impact_type]
      matter_posture_mismatch:
        description: Opinion affects a posture or claim type not present in this matter.
        remediation_hint: constraint
        required_scope_keys: [impact_level, impact_type]
    scope_keys:
      opinion: FROM.opinion_id
      matter: TO.matter_id
      impact_level: EDGE.impact_level
      impact_type: EDGE.impact_type

  opinion_creates_review_item:
    version: 1
    reason_codes:
      unnecessary_review:
        description: Opinion does not create a review obligation.
        remediation_hint: decision_policy
        required_scope_keys: [obligation_type]
      wrong_obligation_type:
        description: Review obligation type is incorrect.
        remediation_hint: provider_fix
        required_scope_keys: [obligation_type]
    scope_keys:
      opinion: FROM.opinion_id
      review_item: TO.review_item_id
      obligation_type: EDGE.obligation_type

  review_item_for_matter:
    version: 1
    reason_codes:
      wrong_matter:
        description: Review item was routed to the wrong matter.
        remediation_hint: provider_fix
        required_scope_keys: [assignment_basis]
      duplicate_review_item:
        description: Review item duplicates existing matter work.
        remediation_hint: decision_policy
        required_scope_keys: [assignment_basis]
    scope_keys:
      review_item: FROM.review_item_id
      matter: TO.matter_id
      assignment_basis: EDGE.assignment_basis

  filing_requires_response:
    version: 1
    reason_codes:
      no_response_required:
        description: This filing does not create a response obligation for the matter.
        remediation_hint: constraint
        required_scope_keys: [response_type]
      deadline_extraction_error:
        description: The filing response deadline was incorrectly extracted or normalized.
        remediation_hint: provider_fix
        required_scope_keys: [response_type]
      wrong_matter_routing:
        description: The filing was routed to the wrong tracked matter.
        remediation_hint: quality_check
        required_scope_keys: [response_type]
    scope_keys:
      filing: FROM.filing_id
      matter: TO.matter_id
      response_type: EDGE.response_type

outcome_profiles:
  matter_scope_resolution:
    anchor_type: resolution
    relationship_type: matter_turns_on_statute
    version: 1
    outcome_codes:
      scope_confirmed:
        description: Later review confirmed the matter-scope link.
        remediation_hint: unknown
        required_scope_keys: [relationship_type]
      scope_too_broad:
        description: The accepted matter-scope link was broader than the matter actually required.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      missed_core_statute:
        description: A core statute, rule, or doctrine was missed during matter scoping.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  matter_impact_resolution:
    anchor_type: resolution
    relationship_type: opinion_affects_matter
    version: 1
    outcome_codes:
      strategy_updated:
        description: Matter strategy, filing plan, or client advice changed because of this opinion.
        remediation_hint: unknown
        required_scope_keys: [relationship_type]
      no_actual_impact:
        description: Later review found the accepted impact did not change the matter.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      missed_matter:
        description: A matter was later found to be affected but was missed by the workflow.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  treatment_resolution:
    anchor_type: resolution
    relationship_type: opinion_treats_opinion
    version: 1
    outcome_codes:
      treatment_confirmed:
        description: Attorney review or later citation history confirmed the treatment.
        remediation_hint: unknown
        required_scope_keys: [relationship_type]
      treatment_overstated:
        description: Later review showed the treatment was overstated.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      negative_treatment_missed:
        description: Negative treatment existed but was missed by the workflow.
        remediation_hint: workflow_fix
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  filing_response_resolution:
    anchor_type: resolution
    relationship_type: filing_requires_response
    version: 1
    outcome_codes:
      response_obligation_confirmed:
        description: Later matter activity confirmed that the response obligation applied.
        remediation_hint: unknown
        required_scope_keys: [relationship_type]
      false_deadline:
        description: The accepted response obligation or deadline was incorrect.
        remediation_hint: trust_adjustment
        required_scope_keys: [relationship_type]
      missed_deadline:
        description: A real response obligation or deadline was missed.
        remediation_hint: require_review
        required_scope_keys: [relationship_type]
      date_parse_error:
        description: The filing date or response deadline was parsed incorrectly.
        remediation_hint: provider_fix
        required_scope_keys: [relationship_type]
    scope_keys:
      relationship_type: RESOLUTION.relationship_type

  adverse_authority_query:
    anchor_type: receipt
    surface_type: query
    surface_name: adverse_authority_for_matter
    version: 1
    outcome_codes:
      missed_adverse_authority:
        description: Query omitted authority later judged adverse to the matter.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      false_positive_authority:
        description: Query returned authority later judged not adverse.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name

  client_impact_query:
    anchor_type: receipt
    surface_type: query
    surface_name: client_impact_watch
    version: 1
    outcome_codes:
      missed_client_impact:
        description: Query omitted an opinion later judged material to the client's matters.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      false_client_impact:
        description: Query returned an opinion later judged not material to the client's matters.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name

  deadline_watch_query:
    anchor_type: receipt
    surface_type: query
    surface_name: deadline_watch
    version: 1
    outcome_codes:
      missed_deadline:
        description: Query omitted a real pending matter deadline.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      stale_deadline:
        description: Query returned a deadline that should have been closed or superseded.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name

  filing_response_query:
    anchor_type: receipt
    surface_type: query
    surface_name: filing_response_obligations_for_matter
    version: 1
    outcome_codes:
      missed_response_obligation:
        description: Query omitted a filing that required response.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      stale_response_obligation:
        description: Query returned a filing obligation that no longer applied.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name

  argument_track_record_query:
    anchor_type: receipt
    surface_type: query
    surface_name: argument_track_record
    version: 1
    outcome_codes:
      missing_outcome_context:
        description: Query omitted a relevant outcome for the argument pattern.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      misleading_track_record:
        description: Query returned outcome context that overstated the argument's usefulness.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name

  review_item_query:
    anchor_type: receipt
    surface_type: query
    surface_name: review_items_for_matter
    version: 1
    outcome_codes:
      missed_review_item:
        description: Query omitted a review item later needed for the matter.
        remediation_hint: graph_fix
        required_scope_keys: [query]
      stale_review_item:
        description: Query returned a review item that should have been closed or superseded.
        remediation_hint: graph_fix
        required_scope_keys: [query]
    scope_keys:
      query: SURFACE.name
