workflows:
  propose_holdings_from_opinion:
    canonical: false
    description: Extract candidate holdings from monitored opinions.
    contract_in: EmptyInput
    steps:
      - id: opinions
        list_entities:
          entity_type: Opinion
        as: opinions
      - id: holdings
        provider: extract_holdings_from_opinions
        input:
          opinions: $steps.opinions.items
        as: holdings
      - id: candidates
        make_candidates:
          relationship_type: opinion_has_holding
          items: $steps.holdings.items
          from_type: Opinion
          from_id: $item.opinion_id
          to_type: Holding
          to_id: $item.holding_id
          properties:
            locator: $item.locator
            rationale: $item.rationale
        as: candidates
      - id: signals
        map_signals:
          integration: holding_extractor
          items: $steps.holdings.items
          from_id: $item.opinion_id
          to_id: $item.holding_id
          evidence: $item.rationale
          enum:
            path: verdict
            map:
              support: support
              unsure: unsure
              contradict: contradict
        as: signals
      - id: proposal
        propose_relationship_group:
          relationship_type: opinion_has_holding
          candidates_from: candidates
          signals_from: [signals]
          thesis_text: These monitored opinions contain the proposed holdings.
          thesis_facts:
            rule_id: opinion_holding_extraction
            rule_version: 1
          proposed_by: agent
        as: proposal
    returns: proposal

  propose_statute_interpretations:
    canonical: false
    description: Propose statute and rule interpretation links for reviewed holdings.
